/* Novo Loader Uiverse */
.loader {
  position: relative;

  content: "";
  position: absolute;
  bottom: 30px;
  left: 50px;

  background: #3b82f6; /* Mudei para o seu Azul Maker para combinar com o layout */

.loader:after {

}

@keyframes loading-bounce {
  0% { transform: scale(1, 0.7); }
  40% { transform: scale(0.8, 1.2); }
  60% { transform: scale(1, 1); }
  100% { bottom: 140px; }
}

@keyframes loading-step {

    box-shadow: 0 10px 0 rgba(0, 0, 0, 0),

// --- CARREGAMENTO DE DADOS (VERSÃO SINCRONIZADA TOTAL E SEM LIMITES) ---
async function refreshData() {
    showLoading("Sincronizando Banco de Dados...");
    const progressEl = document.getElementById('loader-progress');

    try {
        // 1. BUSCA DE VÍNCULOS (LAB_ASSIGNMENTS) - COM PAGINAÇÃO INFINITA
        progressEl.innerText = "Buscando grupos e lados...";
        let allFetchedAssignments = [];
        let pageAssign = 0;
        const pageSizeAssign = 1000;
        let lastAssignCount = 0;

        do {
            const { data: assignData, error: assignError } = await _supabase
                .from('lab_assignments')
                .select('*')
                .range(pageAssign * pageSizeAssign, (pageAssign + 1) * pageSizeAssign - 1);

            if (assignError) throw assignError;
            
            allFetchedAssignments = allFetchedAssignments.concat(assignData);
            lastAssignCount = assignData.length;
            pageAssign++;
        } while (lastAssignCount === pageSizeAssign);

        allAssignments = allFetchedAssignments; // ATRIBUIÇÃO DOS VÍNCULOS COMPLETOS

        // 2. BUSCA DE ALUNOS (PAGINAÇÃO)
        let allFetchedStudents = [];
        let page = 0;
        const pageSize = 1000;
        let lastCount = 0;

        do {
            const { data, error } = await _supabase
                .from('students')
                .select('*')
                .range(page * pageSize, (page + 1) * pageSize - 1);

            if (error) throw error;
            allFetchedStudents = allFetchedStudents.concat(data);
            lastCount = data.length;
            page++;
            progressEl.innerText = `Alunos carregados: ${allFetchedStudents.length}`;
        } while (lastCount === pageSize);

        allStudents = allFetchedStudents;

        // 3. BUSCA DE FREQUÊNCIA
        const dKey = selectedDate.toISOString().split('T')[0];
        const { data: attData } = await _supabase
            .from('attendance')
            .select('*')
            .eq('data_presenca', dKey);
        allAttendances = attData || [];

     // 3.5. BUSCA DE PROJETOS, ETAPAS E PROGRESSO
        progressEl.innerText = "Carregando projetos estruturais...";
        const { data: projData } = await _supabase.from('projetos').select('*');
        allProjects = projData || [];
        
        const { data: stageData } = await _supabase.from('etapas_projeto').select('*');
        allStages = stageData || [];

        const { data: progData } = await _supabase.from('progresso_equipes').select('*');
        allProgress = progData || [];
      // 3.6. BUSCA DO CALENDÁRIO E LOGS
        progressEl.innerText = "Carregando agenda de aulas...";
        const { data: evData } = await _supabase.from('calendario_eventos').select('*');
        allEvents = evData || [];
        
        const { data: schData } = await _supabase.from('horario_aulas').select('*');
        allSchedules = schData || [];
        
        const { data: logData } = await _supabase.from('registro_diario_aulas').select('*');
        allClassLogs = logData || [];

        // 4. ATUALIZAÇÃO DA INTERFACE
        if (currentScreen === 'management') applyFilters(); 
        else if (currentScreen === 'attendance') applyAttendanceFilters();
        else if (currentScreen === 'evaluation') applyEvalList();

        showToast("Sincronização concluída!", "success");
    } catch (err) {
        console.error("Erro crítico:", err);
        showToast("Falha na sincronização", "error");
    } finally {
        setTimeout(() => hideLoading(), 500);
    }
}

   function showLoading(msg = "Sincronizando Laboratório...") {
    const overlay = document.getElementById('loading-overlay');
    if (!overlay) return;
    document.getElementById('loader-progress').innerText = msg;
    
    overlay.style.display = "flex"; // Força a exibição
    overlay.classList.remove('hidden');
    setTimeout(() => { overlay.style.opacity = "1"; }, 10);
}

function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (!overlay) return;
    
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.classList.add('hidden');
        overlay.style.display = "none"; // Remove do caminho dos cliques
    }, 500);
}

    function getStudentAssignment(ra) {

    return allAssignments.find(a => 
        String(a.ra_aluno).trim() === String(ra).trim() && 
        String(a.disciplina).toLowerCase() === String(currentLab).toLowerCase()
    ) || { lado: null, grupo: null };
}

        showToast("Carregando data...", "info");
        await refreshData(); 
        renderAttendanceScreen();
    }
}

    async function loadEvaluatorsList() {
    const { data, error } = await _supabase
        .from('evaluations_fetec')
        .select('nome_professor');

    if (error) return;

    // Filtra apenas nomes únicos e remove nulos
    const uniqueNames = [...new Set(data.map(item => item.nome_professor))].filter(Boolean).sort();
    
    const datalist = document.getElementById('evaluators-list');
    if (datalist) {
        datalist.innerHTML = uniqueNames.map(nome => `<option value="${nome}">`).join('');
    }
}

    function populateInitialResultFilters() {
    const sedes = [...new Set(allStudents.map(s => s.sede))].filter(Boolean).sort();
    const sedeSelect = document.getElementById('res-sede');
    
    if (sedeSelect) {
        sedeSelect.innerHTML = sedes.map(s => `<option value="${s}">${s}</option>`).join('');
    }
    
    updateResultFilters(); // Popula séries e turmas com base na primeira sede
    setTimeout(() => generateRanking(), 100);
}

function updateResultFilters() {
    const sedeSel = document.getElementById('res-sede');
    const serieSel = document.getElementById('res-serie');
    const turmaSel = document.getElementById('res-turma');
    const grupoSel = document.getElementById('res-grupo');

    if (!sedeSel || !serieSel || !turmaSel || !grupoSel) return;

    const s = sedeSel.value;
    const sr = serieSel.value;
    const turmaAtual = turmaSel.value;
    const grupoAtual = grupoSel.value;

    // 1. Filtra alunos pela sede
    let listaFiltrada = allStudents.filter(x => x.sede === s);
    const series = [...new Set(listaFiltrada.map(x => x.serie))].filter(Boolean).sort();
    
    // Atualiza o select de Séries
    const serieAnterior = sr;
    serieSel.innerHTML = series.map(x => `<option value="${x}">${x}</option>`).join('');
    if (series.includes(serieAnterior)) {
        serieSel.value = serieAnterior;
    } else if (series.length > 0) {
        serieSel.value = series[0];
    }

    // 2. Filtra alunos pela Sede E Série atualizadas
    const srAtual = serieSel.value;
    listaFiltrada = listaFiltrada.filter(x => x.serie === srAtual);

    // Extrai e atualiza as Turmas
    const turmas = [...new Set(listaFiltrada.map(x => x.nome_turma))].filter(Boolean).sort();
    
    turmaSel.innerHTML = '<option value="todos">Todas as Turmas</option>' + 
                         turmas.map(t => `<option value="${t}">${t}</option>`).join('');
                         
    if (turmas.includes(turmaAtual)) {
        turmaSel.value = turmaAtual;
    }
    
    // 3. Atualiza os Grupos baseados na turma selecionada
    let listaTurma = listaFiltrada;
    if (turmaSel.value !== 'todos') {
        listaTurma = listaFiltrada.filter(x => x.nome_turma === turmaSel.value);
    }
    
    const grupos = [...new Set(listaTurma.map(x => {
        const assign = getStudentAssignment(x.ra);
        return assign.grupo;
    }))].filter(Boolean).sort((a,b) => a - b);
    
    grupoSel.innerHTML = '<option value="todos">Todos os Grupos</option>' + 
                         grupos.map(g => `<option value="${g}">Grupo ${g}</option>`).join('');
                         
    if (grupos.map(String).includes(String(grupoAtual))) {
        grupoSel.value = grupoAtual;
    }
}

async function generateRanking() {
    const sede = document.getElementById('res-sede').value;
    const serie = document.getElementById('res-serie').value;
    const turmaFiltro = document.getElementById('res-turma').value;
    const ladoFiltro = document.getElementById('res-lado').value;
    const grupoFiltro = document.getElementById('res-grupo').value; 
    const container = document.getElementById('results-content');

    if (!sede || !serie) return;

    container.innerHTML = `
        <div class="text-center py-20">
            <div class="loader"></div>
            <p class="text-slate-500 italic mt-8">Consolidando resultados filtrados...</p>
        </div>`;

    try {
        let query = _supabase.from('evaluations_fetec').select('*')
            .eq('sede', sede)
            .eq('serie', serie)
            .eq('disciplina', currentLab);

        if (turmaFiltro !== 'todos') {
            query = query.eq('nome_turma', turmaFiltro);
        }

        let { data: evals, error } = await query;

        if (error) throw error;
        if (!evals || evals.length === 0) {
            container.innerHTML = `<p class="text-center py-20 text-slate-500 italic">Nenhuma avaliação encontrada para os filtros selecionados.</p>`;
            return;
        }

        evals.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        
        const evalsUnicos = [];
        const controleDuplicidade = new Set();

        evals.forEach(e => {
            const projetoChave = e.ra_aluno ? e.ra_aluno : `G|${e.sede}|${e.nome_turma}|${e.lado}|${e.grupo}`;
            const profChave = `${projetoChave}|${e.nome_professor}`;

            if (!controleDuplicidade.has(profChave)) {
                controleDuplicidade.add(profChave);
                evalsUnicos.push(e);
            }
        });

        evals = evalsUnicos;

        if (ladoFiltro !== 'todos') {
            evals = evals.filter(e => e.lado === ladoFiltro);
        }
        if (grupoFiltro !== 'todos') {
            evals = evals.filter(e => String(e.grupo) === String(grupoFiltro));
        }

        const processado = {};

        evals.forEach(e => {
            const key = e.ra_aluno ? e.ra_aluno : `GRUPO|${e.sede}|${e.nome_turma}|${e.lado}|${e.grupo}`;

            if (!processado[key]) {
                let identificacao = "";
                
                if (e.ra_aluno) {
                    const aluno = allStudents.find(s => String(s.ra) === String(e.ra_aluno));
                    identificacao = aluno ? aluno.nome_aluno : `RA: ${e.ra_aluno}`;
                } else {
                    const alunosDaTurma = allStudents.filter(s => 
                        s.sede === e.sede && 
                        s.serie === e.serie && 
                        s.nome_turma === e.nome_turma
                    );
                    
                    const integrantes = alunosDaTurma.filter(s => {
                        const assign = getStudentAssignment(s.ra);
                        return String(assign.grupo) === String(e.grupo) && assign.lado === e.lado;
                    }).map(s => s.nome_aluno).sort().join(', ');
                    
                    identificacao = `
                        <div class="flex flex-col">
                            <span class="text-white font-bold uppercase tracking-tight">Lado ${e.lado || '?'} - Grupo ${e.grupo || '?'}</span>
                            <span class="text-[9px] text-slate-500 italic leading-tight">${integrantes || 'Nenhum aluno atribuído'}</span>
                        </div>`;
                }

                processado[key] = { 
                    key: key, 
                    nome: identificacao, 
                    avaliacoes: [], 
                    turma: e.nome_turma, 
                    apto: false 
                };
            }
            
            const isOitavoCiencias = currentLab === 'ciencias' && e.serie.includes('8');
            let notaDesteProf = 0;
            
            if (isOitavoCiencias) {
                notaDesteProf = (parseFloat(e.nota_pontualidade) || 0) + 
                                (parseFloat(e.nota_execucao) || 0) + 
                                (parseFloat(e.nota_criatividade) || 0) + 
                                (parseFloat(e.nota_cartaz) || 0) + 
                                (parseFloat(e.nota_apresentacao) || 0);
            } else {
                const n1 = parseFloat(e.nota_oralidade) || 0;
                const n2 = parseFloat(e.nota_postura) || 0;
                const n3 = parseFloat(e.nota_dominio) || 0; 
                notaDesteProf = (n1 + n2 + n3) / 3;
            }
            
            processado[key].avaliacoes.push(notaDesteProf);
            if (e.apto_fetec) processado[key].apto = true;
        });

        const rankingFinal = Object.values(processado).map(obj => {
            const soma = obj.avaliacoes.reduce((acc, n) => acc + n, 0);
            obj.mediaFinal = soma / obj.avaliacoes.length;
            return obj;
        }).sort((a, b) => b.mediaFinal - a.mediaFinal);
        
        window.lastRankingData = rankingFinal;

        const listaAptos = rankingFinal.filter(r => r.apto === true);
        const listaGeral = rankingFinal.filter(r => r.apto !== true);

        let htmlFinal = '';
        if (listaAptos.length > 0) htmlFinal += renderTabelaRanking(listaAptos, `🌟 Selecionados FETEC`, "border-amber-500/30 bg-amber-500/5", "text-amber-400");
        if (listaGeral.length > 0) htmlFinal += renderTabelaRanking(listaGeral, `📊 Classificação Geral`, "border-slate-700 bg-slate-900/50", "text-slate-400");

        container.innerHTML = htmlFinal || `<p class="text-center py-20 text-slate-500 italic">Nenhum aluno/grupo restou após os filtros.</p>`;

    } catch (err) {
        console.error("Erro no Ranking:", err);
        showToast("Erro ao processar ranking", "error");
    }
}

   function applyEvalList() {
    const sede = document.getElementById('ev-sede').value;
    const serie = document.getElementById('ev-serie').value;
    const turma = document.getElementById('ev-turma').value;
    const lado = document.getElementById('ev-lado').value;
    const grupoSel = document.getElementById('ev-grupo').value;
    const cont = document.getElementById('eval-container');

    if (!cont) return;

    cont.innerHTML = ''; 

    if (!sede || !serie || !turma) {
        cont.innerHTML = `<div class="col-span-full text-center py-20 bg-slate-900/50 rounded-2xl border border-dashed border-slate-700">
            <p class="text-white font-bold text-lg">Aguardando Filtros</p>
            <p class="text-slate-500 text-sm mt-2">Selecione <b>Sede, Série e Turma</b>.</p>
        </div>`;
        return; 
    }

    let listaBase = allStudents.filter(s => s.sede === sede && s.serie === serie && s.nome_turma === turma);
    
    const listaComVinculo = listaBase.map(aluno => {
        const vinculo = allAssignments.find(a => 
            a.ra_aluno === aluno.ra && 
            a.disciplina === currentLab
        ) || { lado: null, grupo: null };
        
        return { ...aluno, currentLado: vinculo.lado, currentGrupo: vinculo.grupo };
    });

    let listaFiltrada;
    if (lado === 'todos') {
        listaFiltrada = listaComVinculo;
    } else {
        listaFiltrada = listaComVinculo.filter(s => s.currentLado === lado);
    }
    
    if (grupoSel !== 'todos') {
        listaFiltrada = listaFiltrada.filter(s => String(s.currentGrupo) === grupoSel);
    }

    if (listaFiltrada.length === 0) {
        cont.innerHTML = `<div class="col-span-full text-center py-20 bg-slate-900/50 rounded-2xl border border-dashed border-slate-700">
            <p class="text-slate-500 italic text-sm">Nenhum aluno/grupo localizado.</p>
        </div>`;
        return;
    }

    if (serie.includes("6")) {
        cont.innerHTML = listaFiltrada
            .sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno))
            .map(aluno => {
                const infoGrupo = aluno.currentGrupo ? `Grupo ${aluno.currentGrupo}` : 'Sem Grupo';
                const labelLado = aluno.currentLado ? `Lado ${aluno.currentLado}` : 'S/L';
                return renderEvalCard(`${aluno.nome_aluno}`, aluno.ra, aluno.currentGrupo, aluno.currentLado, `${labelLado} | ${infoGrupo}`, serie);
            })
            .join('');
    } else {
        const gruposLado = {};
        
        listaFiltrada.forEach(s => {
            if (!s.currentGrupo || !s.currentLado) return; 
            const key = `${s.currentLado}-${s.currentGrupo}`;
            
            if (!gruposLado[key]) {
                gruposLado[key] = { lado: s.currentLado, grupo: s.currentGrupo, nomes: [] };
            }
            gruposLado[key].nomes.push(s.nome_aluno);
        });

        const chavesOrdenadas = Object.keys(gruposLado).sort();
        
        if (chavesOrdenadas.length === 0 && currentLab === 'ciencias') {
             cont.innerHTML = `<p class="col-span-full text-center py-10 text-slate-500 italic">Aguardando atribuição de grupos em Ciências...</p>`;
             return;
        }

        cont.innerHTML = chavesOrdenadas.map(k => {
            const g = gruposLado[k];
            const integrantes = g.nomes.sort().join(', ');
            return renderEvalCard(`LADO ${g.lado} - GRUPO ${g.grupo}`, null, g.grupo, g.lado, integrantes, serie);
        }).join('');
    }
    
   setTimeout(() => {
        loadExistingEvaluations(); 
    }, 200);
}

        const v = parseFloat(i.value.toString().replace(',', '.'));
        const maxPermitido = parseFloat(i.getAttribute('max')) || 10;
        if (isNaN(v) || v > maxPermitido || v < 0) notaInvalida = true;
    });

    if (notaInvalida) {
        showToast("⚠️ Notas inválidas! Verifique os limites de cada critério.", "error");
        return;
    }

    const card = document.getElementById(`card-${cardId}`);
    const btn = card.querySelector('button');
    const originalBtnText = btn.innerText;
    
    btn.disabled = true;
    btn.innerText = "⏳ Sincronizando...";
    card.style.opacity = "0.7";

    const getNotaLimpa = (sub) => {
        const input = document.getElementById(`nota-${cardId}-${sub}`);
        if (!input || !input.value) return 0;
        const valor = parseFloat(input.value.toString().replace(',', '.'));
        return isNaN(valor) ? 0 : valor;
    };

    const sedeAtual = document.getElementById('ev-sede').value;
    const serieAtual = document.getElementById('ev-serie').value;
    const turmaAtual = document.getElementById('ev-turma').value;
    const ladoReal = (ladoCard && ladoCard !== 'null' && ladoCard !== 'undefined') ? ladoCard : null;

    const payload = {
        ra_aluno: (ra && ra !== 'null' && ra !== 'undefined') ? ra : null,
        grupo: (grupo && grupo !== 'null' && grupo !== 'undefined') ? parseInt(grupo) : null,
        lado: ladoReal, 
        nome_professor: prof,
        disciplina: currentLab,
        data_eval: new Date().toISOString().split('T')[0],
        
        nota_oralidade: getNotaLimpa('Oralidade'),
        nota_postura: getNotaLimpa('Postura'),
        nota_dominio: getNotaLimpa('Dominio'),
        
        nota_pontualidade: getNotaLimpa('Pontualidade'),
        nota_execucao: getNotaLimpa('Execucao'),
        nota_criatividade: getNotaLimpa('Criatividade'),
        nota_cartaz: getNotaLimpa('Cartaz'),
        nota_apresentacao: getNotaLimpa('Apresentacao'),
        
        nota_clareza: 0, 
        nota_transmissao: 0,
        
        observacao: document.getElementById(`obs-${cardId}`).value,
        apto_fetec: document.getElementById(`apto-${cardId}`).checked,
        sede: sedeAtual,
        serie: serieAtual,
        nome_turma: turmaAtual,
        usuario_sistema: currentUser
    };

    try {
        const { error: dbError } = await _supabase
            .from('evaluations_fetec')
            .upsert([payload], { 
                onConflict: 'nome_professor, ra_aluno, grupo, lado, nome_turma, disciplina, sede' 
            });

        if (dbError) throw dbError;

        showToast("✅ Avaliação Sincronizada!", "success");
        
        card.classList.add('border-emerald-500/50');
        card.style.opacity = "1";
        btn.disabled = false;
        btn.innerText = "🔄 Atualizar Nota";
        btn.classList.replace('bg-emerald-600', 'bg-blue-600');
        
        profInput.readOnly = true;
        profInput.classList.add('bg-slate-800', 'text-slate-400');

        focusNextCard(cardId);

    } catch (error) {
        console.error("Erro Supabase:", error);
        showToast("❌ Erro ao salvar: " + error.message, "error");
        btn.disabled = false;
        btn.innerText = originalBtnText;
        card.style.opacity = "1";
    }
}

    function focusNextCard(currentId) {
    // 1. Obtém todos os cards de avaliação que estão na tela no momento
    const allCards = Array.from(document.querySelectorAll('[id^="card-"]'));
    
    // 2. Encontra o índice do card que acabou de ser salvo
    const currentIndex = allCards.findIndex(card => card.id === `card-${currentId}`);
    
    // 3. Verifica se existe um próximo card
    if (currentIndex !== -1 && currentIndex < allCards.length - 1) {
        const nextCard = allCards[currentIndex + 1];

        // 4. Scroll Suave até o próximo card
        nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // 5. Feedback Visual (Piscar levemente o próximo card)
        nextCard.classList.add('ring-2', 'ring-blue-500', 'ring-offset-2', 'ring-offset-slate-900');
        setTimeout(() => {
            nextCard.classList.remove('ring-2', 'ring-blue-500');
        }, 1000);

        // 6. Foco no primeiro input de nota do próximo card
        const firstInput = nextCard.querySelector('input[type="number"]');
        if (firstInput) {
            setTimeout(() => firstInput.focus(), 600); // Aguarda o scroll terminar
        }
    } else {
        showToast("🎉 Fim da lista de avaliação!", "success");
    }
}

   function calculateLiveMedia(cardId) {
    const inputs = document.querySelectorAll(`.eval-input-${cardId}`);
    let soma = 0;
    let preenchidos = 0;
    let temErro = false;
    let isOitavoCiencias = false;

    inputs.forEach(input => {
        if (input.id.includes('Pontualidade')) isOitavoCiencias = true;
        
        let val = parseFloat(input.value.toString().replace(',', '.'));
        let maxVal = parseFloat(input.getAttribute('max')) || 10;
        
        if (val > maxVal) {
            temErro = true;
            input.classList.add('bg-red-900/50', 'border-red-500', 'text-red-200');
        } else {
            input.classList.remove('bg-red-900/50', 'border-red-500', 'text-red-200');
            if (!isNaN(val)) {
                soma += val;
                preenchidos++;
            }
        }
    });

    const display = document.getElementById(`live-media-${cardId}`);
    if (display) {
        if (temErro) {
            display.innerText = "!!";
            display.className = "text-xl font-black text-red-500 animate-bounce";
        } else {
            const media = isOitavoCiencias ? soma : (preenchidos > 0 ? (soma / 3) : 0);
            display.innerText = media.toFixed(1);
            
            const limiteAmarelo = isOitavoCiencias ? 8 : 9;
            const limiteVermelho = isOitavoCiencias ? 5 : 5;

            if (media >= limiteAmarelo) display.className = "text-xl font-black text-yellow-400 leading-none";
            else if (media < limiteVermelho && media > 0) display.className = "text-xl font-black text-red-400 leading-none";
            else display.className = "text-xl font-black text-emerald-400 leading-none";
        }
    }
}

    function populateInitialEvalFilters() {
    const sedes = [...new Set(allStudents.map(s => s.sede))].sort();
    const series = [...new Set(allStudents.map(s => s.serie))].sort();
    
    document.getElementById('ev-sede').innerHTML = sedes.map(s => `<option value="${s}">${s}</option>`).join('');
    document.getElementById('ev-serie').innerHTML = series.map(s => `<option value="${s}">${s}</option>`).join('');
    
    // Tenta carregar filtros persistentes
    const lastFilters = loadPersistentEvalFilters();
    if (lastFilters) {
        if (sedes.includes(lastFilters.sede)) document.getElementById('ev-sede').value = lastFilters.sede;
        if (series.includes(lastFilters.serie)) document.getElementById('ev-serie').value = lastFilters.serie;
    }

    updateEvalFilters(); // Dispara o preenchimento de turmas e grupos

    // Se houver filtros salvos para turma, lado e grupo, aplica-os após o updateEvalFilters
    if (lastFilters) {
        setTimeout(() => {
            const tSel = document.getElementById('ev-turma');
            if (Array.from(tSel.options).some(opt => opt.value === lastFilters.turma)) {
                tSel.value = lastFilters.turma;
            }
            document.getElementById('ev-lado').value = lastFilters.lado || 'todos';
            document.getElementById('ev-grupo').value = lastFilters.grupo || 'todos';
            applyEvalList();
        }, 100);
    }
}

function updateEvalFilters() {
    const s = document.getElementById('ev-sede').value;
    const sr = document.getElementById('ev-serie').value;
    
    // 1. Filtra a base de alunos conforme Sede e Série selecionadas
    const listaFiltrada = allStudents.filter(x => x.sede === s && x.serie === sr);
    
    // 2. Extrai Turmas e Grupos Únicos desta combinação
    const turmas = [...new Set(listaFiltrada.map(x => x.nome_turma))].sort();
    const grupos = [...new Set(listaFiltrada.filter(x => x.grupo).map(x => x.grupo))].sort((a,b) => a - b);

    // 3. Atualiza o Select de Turmas
    const selectTurma = document.getElementById('ev-turma');
    const turmaAnterior = selectTurma.value; // Tenta manter a turma se ela ainda existir na nova série
    
    selectTurma.innerHTML = turmas.map(t => `<option value="${t}">${t}</option>`).join('');
    
    // Se a turma selecionada antes ainda existe na nova série, mantém. Senão, pega a primeira.
    if (turmas.includes(turmaAnterior)) {
        selectTurma.value = turmaAnterior;
    }

    // 4. Atualiza o Select de Grupos
    document.getElementById('ev-grupo').innerHTML = '<option value="todos">Todos os Grupos</option>' + 
                                                     grupos.map(g => `<option value="${g}">Grupo ${g}</option>`).join('');
    
    // 5. Atualiza a lista de cards na tela
    applyEvalList();
}

  async function showEvaluationLog(key) {
    const modal = document.getElementById('log-modal');
    const body = document.getElementById('log-table-body');
    const title = document.getElementById('log-title');
    const subtitle = document.getElementById('log-subtitle');

    if (!modal) return console.error("Modal de log não encontrado!");

    body.innerHTML = `<tr><td colspan="5" class="p-10 text-center italic text-slate-500">Buscando histórico de jurados...</td></tr>`;
    modal.classList.remove('hidden');

    try {
        const isGroup = key.includes('GRUPO|');
        let query = _supabase.from('evaluations_fetec').select('*').eq('disciplina', currentLab);

        if (isGroup) {
            const parts = key.split('|'); 
            const sede = parts[1];
            const turma = parts[2];
            const lado = parts[3];
            const grupoNum = parts[4];

            query = query.eq('sede', sede)
                         .eq('nome_turma', turma)
                         .eq('lado', lado)
                         .eq('grupo', grupoNum);
        } else {
            query = query.eq('ra_aluno', key);
        }

        const { data, error } = await query;

        if (error) throw error;

        if (!data || data.length === 0) {
            body.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-500">Nenhum registro detalhado para este projeto.</td></tr>`;
            return;
        }

        data.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        
        const dadosUnicos = [];
        const professoresVistos = new Set();

        data.forEach(ev => {
            if (!professoresVistos.has(ev.nome_professor)) {
                professoresVistos.add(ev.nome_professor);
                dadosUnicos.push(ev);
            }
        });

        title.innerText = isGroup ? `Histórico: Grupo ${dadosUnicos[0].grupo} (${dadosUnicos[0].lado})` : `Histórico: ${dadosUnicos[0].ra_aluno}`;
        subtitle.innerText = `${dadosUnicos[0].sede} | ${dadosUnicos[0].nome_turma}`;

        body.innerHTML = dadosUnicos.map(ev => {
            const isOitavoCiencias = currentLab === 'ciencias' && ev.serie.includes('8');
            let detalhesNotas = '';
            let notaFinal = 0;
            
            if (isOitavoCiencias) {
                const nP = parseFloat(ev.nota_pontualidade) || 0;
                const nE = parseFloat(ev.nota_execucao) || 0;
                const nC = parseFloat(ev.nota_criatividade) || 0;
                const nCa = parseFloat(ev.nota_cartaz) || 0;
                const nA = parseFloat(ev.nota_apresentacao) || 0;
                
                notaFinal = nP + nE + nC + nCa + nA;
                
                detalhesNotas = `
                    <div class="grid grid-cols-5 gap-1 text-[9px] font-mono text-slate-400 text-center">
                        <div class="bg-slate-800 rounded p-1" title="Pontualidade e Org.">P:${nP}</div>
                        <div class="bg-slate-800 rounded p-1" title="Execução">E:${nE}</div>
                        <div class="bg-slate-800 rounded p-1" title="Criatividade">C:${nC}</div>
                        <div class="bg-slate-800 rounded p-1" title="Cartaz">K:${nCa}</div>
                        <div class="bg-slate-800 rounded p-1" title="Apresentação">A:${nA}</div>
                    </div>
                `;
            } else {
                const nOral = parseFloat(ev.nota_oralidade) || 0;
                const nPost = parseFloat(ev.nota_postura) || 0;
                const nDom  = parseFloat(ev.nota_dominio) || 0;
                
                notaFinal = (nOral + nPost + nDom) / 3;
                
                detalhesNotas = `
                    <div class="grid grid-cols-3 gap-2 text-[10px] font-mono text-slate-400 text-center">
                        <div class="bg-slate-800 rounded p-1" title="Oralidade">O: ${nOral.toFixed(1)}</div>
                        <div class="bg-slate-800 rounded p-1" title="Postura">P: ${nPost.toFixed(1)}</div>
                        <div class="bg-slate-800 rounded p-1" title="Domínio">D: ${nDom.toFixed(1)}</div>
                    </div>
                `;
            }
            
            return `
                <tr class="border-b border-slate-800/50 hover:bg-white/5 transition-colors">
                    <td class="p-3">
                        <span class="font-bold text-blue-400 block">${ev.nome_professor}</span>
                        <span class="text-[9px] text-slate-500 uppercase tracking-tighter italic">Avaliador</span>
                    </td>
                    <td class="p-3">
                        ${detalhesNotas}
                    </td>
                    <td class="p-3">
                        <span class="text-sm font-black text-white bg-blue-600/20 border border-blue-500/30 px-2 py-1 rounded">
                            ${notaFinal.toFixed(2)}
                        </span>
                    </td>
                    <td class="p-3">
                        <p class="text-[11px] text-slate-400 italic leading-snug max-w-xs break-words">
                            ${ev.observacao || '<span class="opacity-20 text-[9px]">Nenhum comentário registrado.</span>'}
                        </p>
                    </td>
                    <td class="p-3 text-center">
                        ${ev.apto_fetec ? 
                            '<span class="text-amber-500 text-lg" title="Apto para FETEC">★</span>' : 
                            '<span class="text-slate-700" title="Não selecionado">☆</span>'}
                    </td>
                </tr>
            `;
        }).join('');

    } catch (err) {
        console.error("Erro no Histórico:", err);
        body.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold">Falha ao buscar os dados do histórico.</td></tr>`;
    }
}

   // --- FUNÇÃO PARA RENDERIZAR A LISTA DE FREQUÊNCIA ---
function applyAttendanceFilters() {
    // 1. Captura os valores selecionados nos filtros da frequência
    const s = document.getElementById('attendance-filter-sede')?.value || 'todos';
    const e = document.getElementById('attendance-filter-serie')?.value || 'todos';
    const t = document.getElementById('attendance-filter-turno')?.value || 'todos';
    
    // 2. Formata a data para a busca (YYYY-MM-DD)
    const dKey = selectedDate.getFullYear() + '-' + 
                 String(selectedDate.getMonth() + 1).padStart(2, '0') + '-' + 
                 String(selectedDate.getDate()).padStart(2, '0');

    // 3. ATUALIZA OS DROPDOWNS (ENCADEAMENTO)
    updateFilterOptions('attendance', { sede: s, serie: e, turma: t });

    // 4. FILTRA A LISTA DE ALUNOS QUE SERÁ EXIBIDA
    const list = allStudents.filter(x => {
        const mSede = s === 'todos' || x.sede === s;
        const mSerie = e === 'todos' || x.serie === e;
        const mTurma = t === 'todos' || x.nome_turma === t;
        return mSede && mSerie && mTurma;
    });

    const countEl = document.getElementById('attendance-count');
    if (countEl) countEl.innerText = list.length;

    const cont = document.getElementById('attendance-list');
    if (!cont) return;

    if (list.length === 0) {
        cont.innerHTML = `<p class="text-slate-500 text-center py-10">Nenhum aluno encontrado para os filtros selecionados.</p>`;
        return;
    }

    // 5. RENDERIZA A LISTA NA TELA
    // Localize o cont.innerHTML dentro de applyAttendanceFilters e substitua por:
cont.innerHTML = list.sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno)).map((x, index) => {
    const att = allAttendances.find(a => a.ra === x.ra && a.data_presenca === dKey);
    const present = att ? att.presente : true;
    return `
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-slate-600 font-mono font-bold w-6">${index + 1}</span>
                <div>
                    <p class="text-white font-bold">${x.nome_aluno}</p>
                    <p class="text-slate-500 text-xs">${x.nome_turma} | Lado: ${x.parte_sala || '-'}</p>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" onchange="togglePresence('${x.ra}', this.checked)" ${present ? 'checked' : ''}>
                <span class="slider"></span>
            </label>
        </div>`;
}).join('');
}

function exportAttendanceToExcel() {
    const dKey = selectedDate.toLocaleDateString('pt-BR');
    const sede = document.getElementById('attendance-filter-sede')?.value || 'todos';
    const serie = document.getElementById('attendance-filter-serie')?.value || 'todos';
    const turno = document.getElementById('attendance-filter-turno')?.value || 'todos';

    // Pega exatamente a lista que a tela está mostrando
    const list = allStudents.filter(x => {
        return (sede === 'todos' || x.sede === sede) && 
               (serie === 'todos' || x.serie === serie) && 
               (turno === 'todos' || x.nome_turma === turno);
    }).sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno));

    if (list.length === 0) return showToast("Nenhum dado para exportar", "error");

    const excelData = list.map((s, index) => {
        const att = allAttendances.find(a => a.ra === s.ra && a.data_presenca === selectedDate.toISOString().split('T')[0]);
        const present = att ? att.presente : true;
        return {
            "Nº": index + 1,
            "Nome do Aluno": s.nome_aluno,
            "RA": s.ra,
            "Turma": s.nome_turma,
            "Sede": s.sede,
            "Status": present ? "PRESENTE" : "AUSENTE"

    async function handleExcelUpload() {
      const file = document.getElementById('excel-upload').files[0];
      if (!file) return showToast("Selecione um arquivo!", "error");

      const btn = document.getElementById('upload-btn');
      const prog = document.getElementById('import-progress');
      const fill = document.getElementById('progress-fill');
      const txt = document.getElementById('progress-text');

      btn.disabled = true;
      prog.classList.remove('hidden');

      const reader = new FileReader();
      reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

        for (let i = 0; i < jsonData.length; i++) {
          const row = jsonData[i];
          const student = {
            sede: String(row.SEDE || ''),
            serie: String(row.SERIE || ''),
            turno: String(row.TURNO || ''),
            curso: String(row.CURSO || ''),
            nome_turma: String(row.NOME_TURMA || ''),
            ra: String(row.RA || ''),
            nome_aluno: String(row.NOME_ALUNO || ''),
            usuario: currentUser
          };

          await _supabase.from('students').upsert(student, { onConflict: 'ra' });
          
          const pct = Math.round(((i + 1) / jsonData.length) * 100);
          fill.style.width = pct + "%";
          txt.innerText = `Importando: ${i+1} de ${jsonData.length}`;
        }
        showToast("Sucesso!", "success");
        await refreshData();
        btn.disabled = false;
        prog.classList.add('hidden');
      };
      reader.readAsArrayBuffer(file);
    }

async function massAssign(field, value) {
    if (selectedStudentsForAssign.size === 0) return alert("Selecione alunos!");
    if (!value && field === 'grupo') return alert("Insira um grupo!");

    showLoading("Gravando alterações...");

    try {
        const payloads = Array.from(selectedStudentsForAssign).map(raSelecionado => {
            // AGORA BUSCAMOS PELO RA, GARANTINDO QUE VAI ACHAR O ALUNO
            const s = allStudents.find(x => String(x.ra).trim() === String(raSelecionado).trim());
            if (!s) return null;

            // Usa a função segura que criamos na etapa anterior
            const currentAssign = getStudentAssignment(s.ra);

            return {
                ra_aluno: String(s.ra).trim(),
                disciplina: currentLab,
                lado: field === 'parte_sala' ? value : currentAssign.lado,
                grupo: field === 'grupo' ? (value ? parseInt(value) : null) : currentAssign.grupo
            };
        }).filter(p => p !== null);

        // A GRANDE TRAVA: Se a lista estiver vazia, ele cancela e te avisa!
        if (payloads.length === 0) {
            alert("❌ Erro grave: Nenhum aluno válido foi encontrado para envio.");
            hideLoading();
            return;
        }

        console.log("Enviando para o banco os seguintes dados:", payloads);

        const { data, error } = await _supabase
            .from('lab_assignments')
            .upsert(payloads, { onConflict: 'ra_aluno,disciplina' })
            .select(); // <--- ADICIONE ESTA LINHA AQUI!

        if (error) throw error;
      console.log("📥 O que o Supabase REALMENTE gravou:", data);

        showToast("✅ Salvo no banco!", "success");
        selectedStudentsForAssign.clear();
        closeAssignRoomModal();
        
        // Atualiza os dados na tela
        await refreshData(); 

    } catch (err) {
        console.error("Erro na atribuição:", err);
        alert("Erro ao salvar: " + err.message);
    } finally {
        hideLoading();
    }
}

    function applyFilters() {
    const sede = document.getElementById('filter-sede')?.value || 'todos';
    const serie = document.getElementById('filter-serie')?.value || 'todos';
    const turma = document.getElementById('filter-turno')?.value || 'todos';
    const parte = document.getElementById('filter-parte-sala')?.value || 'todos';
    const search = document.getElementById('search-nome')?.value.toLowerCase() || '';

    // 1. Atualiza os dropdowns dinamicamente para encadeamento
    updateFilterOptions('management', { sede, serie });

    // 2. Filtra a lista principal
    filteredStudents = allStudents.filter(s => {
        const mSede = sede === 'todos' || s.sede === sede;
        const mSerie = serie === 'todos' || s.serie === serie;
        const mTurma = turma === 'todos' || s.nome_turma === turma;
        const mSearch = s.nome_aluno.toLowerCase().includes(search);
        
        // --- BUSCA O VÍNCULO DO LAB ATUAL PARA O FILTRO ---
       const assign = getStudentAssignment(s.ra);

        let mParte = true;
        if (parte === 'nao-atribuido') {
            mParte = !assign.lado; // Verifica se o lado está vazio no lab atual
        } else if (parte !== 'todos') {
            mParte = assign.lado === parte; // Filtra pelo lado A ou B do lab atual
        }
        
        return mSede && mSerie && mTurma && mSearch && mParte;
    });

    renderStudentList();
}

   function updateFilterOptions(ctx, currentFilters = {}) {
        const prefix = ctx === 'management' ? 'filter' : 'attendance-filter';
        
        // Base de dados para os dropdowns (respeita o encadeamento)
        let baseParaDropdowns = allStudents;
        
        // Se uma sede foi selecionada, as séries devem ser apenas daquela sede
        if (currentFilters.sede && currentFilters.sede !== 'todos') {
            baseParaDropdowns = baseParaDropdowns.filter(s => s.sede === currentFilters.sede);
        }
        
        // Se uma série foi selecionada, as turmas devem ser apenas daquela série
        if (currentFilters.serie && currentFilters.serie !== 'todos') {
            baseParaDropdowns = baseParaDropdowns.filter(s => s.serie === currentFilters.serie);
        }

        const sedes = [...new Set(allStudents.map(s => s.sede))].sort(); 
        const series = [...new Set(baseParaDropdowns.map(s => s.serie))].sort();
        const turmas = [...new Set(baseParaDropdowns.map(s => s.nome_turma))].sort();
        
        const populate = (id, list, selectedValue) => {
            const el = document.getElementById(prefix + id);
            if(el) {
                const previousValue = selectedValue || el.value;
                el.innerHTML = '<option value="todos">Todas</option>' + 
                               list.map(x => `<option value="${x}">${x}</option>`).join('');
                
                // Mantém o valor se ele ainda existir na nova lista filtrada
                if (list.includes(previousValue)) el.value = previousValue;
                else el.value = 'todos';
            }
        };

        // Aplica a filtragem nos selects de acordo com o contexto
        populate('-sede', sedes, currentFilters.sede);
        populate('-serie', series, currentFilters.serie);
        populate('-turno', turmas, currentFilters.turma);
    }

function renderAdminProjects() {
    const list = document.getElementById('admin-project-list');

function selectAdminProject(id, nome) {
    selectedAdminProjectId = id;
    document.getElementById('selected-project-title').innerText = `✏️ Editando: ${nome}`;
    renderAdminProjects(); // Re-renderiza para destacar o selecionado
    renderAdminStages();
}

function renderAdminStages() {
    const overlay = document.getElementById('stage-empty-state');
    const list = document.getElementById('admin-stage-list');
    const inputOrdem = document.getElementById('new-stage-order');
    
    if (!selectedAdminProjectId) {
        overlay.classList.remove('hidden');
        return;
    }
    
    overlay.classList.add('hidden');
    const myStages = allStages.filter(s => s.projeto_id === selectedAdminProjectId).sort((a, b) => a.ordem - b.ordem);
    
    // Sugere o próximo número de ordem automaticamente
    inputOrdem.value = myStages.length > 0 ? myStages[myStages.length - 1].ordem + 1 : 1;

    if (myStages.length === 0) {
        list.innerHTML = `<p class="text-slate-500 text-xs italic p-4 text-center border border-dashed border-slate-700 rounded-lg">Nenhuma etapa. Adicione a primeira acima!</p>`;
        return;
    }

    list.innerHTML = myStages.map(s => `
        <div class="flex justify-between items-center p-3 rounded-lg bg-slate-800 border border-slate-700 hover:border-emerald-500/50 transition-colors">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-900/50 text-emerald-400 font-black w-6 h-6 rounded flex items-center justify-center text-xs">${s.ordem}</span>
                <span class="text-white text-sm">${s.nome_etapa}</span>
            </div>
            <button onclick="deleteStage('${s.id}')" class="text-red-400 hover:text-red-300 px-2">✕</button>
        </div>
    `).join('');
}

async function saveProject() {
    const inputName = document.getElementById('new-project-name');
    const inputSerie = document.getElementById('new-project-serie');
    const nome = inputName.value.trim();
    const serie = inputSerie.value;

    if (!serie) return showToast("Selecione a série do projeto!", "error");
    if (!nome) return showToast("Digite o nome do projeto!", "error");

    showLoading("Salvando projeto...");
    const payload = { 
        nome_projeto: nome, 
        serie: serie, // Salva a série no Supabase
        ano: new Date().getFullYear().toString(), 
        disciplina: currentLab 
    };

    try {
        const { data, error } = await _supabase.from('projetos').insert([payload]).select();
        if (error) throw error;
        
        allProjects.push(data[0]);
        inputName.value = '';
        renderAdminProjects();
        showToast("Projeto criado!", "success");
    } catch (err) {
        showToast("Erro ao criar projeto", "error");
    } finally {
        hideLoading();
    }
}

async function saveStage() {
    const inputName = document.getElementById('new-stage-name');
    const inputOrder = document.getElementById('new-stage-order');
    const nome = inputName.value.trim();
    const ordem = parseInt(inputOrder.value);

    if (!nome || isNaN(ordem)) return showToast("Preencha nome e número da etapa", "error");
    if (!selectedAdminProjectId) return showToast("Selecione um projeto antes", "error");

    showLoading("Salvando etapa...");
    const payload = { projeto_id: selectedAdminProjectId, nome_etapa: nome, ordem: ordem };

    try {
        const { data, error } = await _supabase.from('etapas_projeto').insert([payload]).select();
        if (error) throw error;
        
        allStages.push(data[0]);
        inputName.value = '';
        renderAdminStages();
    } catch (err) {
        showToast("Erro ao criar etapa", "error");
    } finally {
        hideLoading();
    }
}

async function deleteProject(id) {
    if(!confirm("Certeza? Isso apagará o projeto e TODAS as etapas/notas dele!")) return;
    showLoading("Excluindo...");
    const { error } = await _supabase.from('projetos').delete().eq('id', id);
    hideLoading();
    if (error) return showToast("Erro ao excluir", "error");
    
    allProjects = allProjects.filter(p => p.id !== id);
    if(selectedAdminProjectId === id) selectedAdminProjectId = null;
    renderAdminProjects();
    renderAdminStages();
    showToast("Projeto apagado", "success");
}

async function deleteStage(id) {
    showLoading("Excluindo...");
    const { error } = await _supabase.from('etapas_projeto').delete().eq('id', id);
    hideLoading();
    if (error) return showToast("Erro ao excluir", "error");
    
    allStages = allStages.filter(s => s.id !== id);
    renderAdminStages();
}

function updateTrackingFilters() {
    const s = document.getElementById('trk-sede').value;
    const sr = document.getElementById('trk-serie').value;
    
    // 1. Atualiza Turmas daquela série
    const listaFiltrada = allStudents.filter(x => x.sede === s && x.serie === sr);
    const turmas = [...new Set(listaFiltrada.map(x => x.nome_turma))].sort();
    
    const selectTurma = document.getElementById('trk-turma');
    const turmaAnterior = selectTurma.value;
    selectTurma.innerHTML = turmas.map(t => `<option value="${t}">${t}</option>`).join('');
    if (turmas.includes(turmaAnterior)) selectTurma.value = turmaAnterior;

    // 2. Atualiza PROJETOS exclusivos daquela série (A Grande Sacada)
    const projSelect = document.getElementById('trk-projeto');
    const projetosDaSerie = allProjects.filter(p => p.serie === sr && p.disciplina === currentLab);
    
    if (projetosDaSerie.length === 0) {
        projSelect.innerHTML = '<option value="">Nenhum projeto cadastrado...</option>';
        projSelect.disabled = true;
    } else {
        projSelect.disabled = false;
        projSelect.innerHTML = projetosDaSerie.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).map(p => `<option value="${p.id}">${p.nome_projeto}</option>`).join('');
    }

    applyTrackingList();

function applyTrackingList() {
    const sede = document.getElementById('trk-sede').value;
    const serie = document.getElementById('trk-serie').value;
    const turma = document.getElementById('trk-turma').value;
    const ladoFiltro = document.getElementById('trk-lado').value;
    const projetoId = document.getElementById('trk-projeto').value;
    const cont = document.getElementById('tracking-container');

    if (!projetoId) {
        cont.innerHTML = `
            <div class="col-span-full text-center py-20 bg-slate-900/50 rounded-2xl border border-dashed border-slate-700">
                <p class="text-white font-bold text-lg">Sem Projetos Ativos</p>
                <p class="text-slate-500 text-sm mt-2">Peça ao Administrador para cadastrar um projeto para o <b class="text-purple-400">${serie}</b> na Engrenagem ⚙️ Projetos.</p>
            </div>`;
        return;
    }

    // Agrupa os alunos por Equipe
    const alunosTurma = allStudents.filter(s => s.sede === sede && s.serie === serie && s.nome_turma === turma);
    const equipes = {};
    
    alunosTurma.forEach(aluno => {
        const assign = getStudentAssignment(aluno.ra);
        if (!assign.grupo || !assign.lado) return; // Ignora quem não tem grupo
        if (ladoFiltro !== 'todos' && assign.lado !== ladoFiltro) return;

        const key = `${assign.lado}-${assign.grupo}`;
        if (!equipes[key]) equipes[key] = { lado: assign.lado, grupo: assign.grupo, nomes: [] };
        equipes[key].nomes.push(aluno.nome_aluno);
    });

    const chavesOrdenadas = Object.keys(equipes).sort();

    if (chavesOrdenadas.length === 0) {
        cont.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500 italic">Nenhuma equipe formada nesta turma. Use a aba "Gestão" para atribuir os alunos.</div>`;
        return;
    }

    // Busca as etapas estruturais deste projeto
    const etapasDoProjeto = allStages.filter(e => e.projeto_id === projetoId).sort((a,b) => a.ordem - b.ordem);

    cont.innerHTML = chavesOrdenadas.map(k => {
        const eq = equipes[k];
        const integrantes = eq.nomes.sort().join(', ');
        
        // Busca onde essa equipe parou
        const prog = allProgress.find(p => 
            p.sede === sede && p.serie === serie && p.nome_turma === turma && 
            p.lado === eq.lado && String(p.grupo) === String(eq.grupo) && 
            p.projeto_id === projetoId && p.disciplina === currentLab
        );
        const etapaAtualId = prog ? prog.etapa_atual_id : null;

        return renderTrackingCard(eq.lado, eq.grupo, integrantes, projetoId, etapasDoProjeto, etapaAtualId);
    }).join('');
}

function renderTrackingCard(lado, grupo, integrantes, projetoId, etapas, etapaAtualId) {
    // Descobre em qual índice do array está a etapa salva no banco.
    // Se não tiver progresso salvo, fica -1.
    const etapaEncontradaIndex = etapas.findIndex(e => e.id === etapaAtualId);

    const etapasHtml = etapas.map((etapa, idx) => {
        const isCompleted = idx <= etapaEncontradaIndex; // Se está antes ou na bolinha atual, fica pintada
        
        // --- A MÁGICA DE DESMARCAR AQUI ---
        // Qual será a etapa enviada ao banco se o professor clicar nesta bolinha?
        let targetEtapaId = `'${etapa.id}'`; 
        
        // Se a bolinha clicada for EXATAMENTE a última que está ativa, significa que ele quer "desfazer"
        if (etapa.id === etapaAtualId) {
            // Se for a etapa 2 em diante, retrocede para a anterior. Se for a etapa 1, manda 'null' (zera tudo)
            targetEtapaId = idx > 0 ? `'${etapas[idx - 1].id}'` : null;
        }
        // ----------------------------------

        const bolinhaClass = isCompleted 
            ? "bg-purple-500 text-white border-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.5)] scale-110" 
            : "bg-slate-800 text-slate-500 border-slate-600 hover:border-purple-400 hover:text-purple-400";
            
        // A linha conecta a bolinha atual com a próxima
        const linhaClass = (idx < etapas.length - 1) 
            ? (idx < etapaEncontradaIndex ? "bg-purple-500" : "bg-slate-700") 
            : "";

        return `
            <div class="flex flex-col items-center relative flex-1 group cursor-pointer" onclick="saveTeamProgress('${lado}', ${grupo}, '${projetoId}', ${targetEtapaId})">
                <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center text-xs font-black z-10 transition-all duration-300 ${bolinhaClass}">
                    ${isCompleted ? '✓' : etapa.ordem}
                </div>
                <div class="text-[9px] text-center mt-2 font-medium ${isCompleted ? 'text-purple-300 font-bold' : 'text-slate-500 group-hover:text-slate-300'} break-words px-1 leading-tight">
                    ${etapa.nome_etapa}
                </div>
                ${idx < etapas.length - 1 ? `<div class="absolute top-4 left-1/2 w-full h-[2px] -z-0 transition-colors ${linhaClass}"></div>` : ''}
            </div>
        `;
    }).join('');

    return `
        <div class="bg-slate-900 p-5 rounded-2xl border border-slate-700 hover:border-purple-500/50 transition-all shadow-lg flex flex-col h-full relative overflow-hidden">
            ${etapaEncontradaIndex === etapas.length - 1 && etapas.length > 0 ? '<div class="absolute top-0 right-0 bg-purple-600 text-[9px] font-black px-3 py-1 rounded-bl-lg">CONCLUÍDO 🏆</div>' : ''}
            
            <div class="flex flex-col border-b border-slate-800 pb-3 mb-5 pr-8">
                <h3 class="text-white font-black text-xl leading-none">LADO ${lado} - GRUPO ${grupo}</h3>
                <p class="text-slate-500 text-[10px] mt-1 italic leading-tight line-clamp-2" title="${integrantes}">${integrantes}</p>
            </div>
            
            <div class="flex justify-between items-start w-full mt-auto pt-2">
                ${etapas.length > 0 ? etapasHtml : '<p class="text-xs text-slate-500 italic w-full text-center bg-slate-800/50 p-2 rounded">O admin ainda não inseriu as etapas deste projeto.</p>'}
            </div>
        </div>
    `;
}

async function saveTeamProgress(lado, grupo, projetoId, etapaId) {
    const sede = document.getElementById('trk-sede').value;
    const serie = document.getElementById('trk-serie').value;
    const turma = document.getElementById('trk-turma').value;

    showLoading("Registrando...");

    const payload = {
        sede, 
        serie, 
        nome_turma: turma, 
        lado, 
        grupo: parseInt(grupo),
        projeto_id: projetoId, 
        etapa_atual_id: etapaId,
        disciplina: currentLab, 
        atualizado_por: currentUser
    };

    try {
        const { data, error } = await _supabase
            .from('progresso_equipes')
            .upsert([payload], { onConflict: 'sede,serie,nome_turma,lado,grupo,projeto_id,disciplina' })
            .select();

        if (error) throw error;

        // Atualiza a memória local para piscar na tela instantaneamente
        const progIndex = allProgress.findIndex(p => 
            p.sede === sede && p.serie === serie && p.nome_turma === turma && 
            p.lado === lado && String(p.grupo) === String(grupo) && 
            p.projeto_id === projetoId && p.disciplina === currentLab
        );
        
        if (progIndex !== -1) {
            allProgress[progIndex] = data[0];
        } else {
            allProgress.push(data[0]);
        }

        applyTrackingList(); // Recarrega os cards
        showToast("Progresso salvo!", "success");

    } catch (err) {
        console.error(err);
        showToast("Erro ao registrar progresso no banco.", "error");
    } finally {
        hideLoading();
    }
}

function renderHorariosFixos() {
    const list = document.getElementById('lista-horarios-fixos');
    const meusHorarios = allSchedules.filter(s => s.disciplina === currentLab);
    
    if (meusHorarios.length === 0) {
        list.innerHTML = `<p class="text-slate-500 italic p-4 text-center border border-dashed border-slate-700 rounded-lg">Nenhum horário fixo cadastrado.</p>`;
        return;
    }

    const diasNomes = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

    list.innerHTML = meusHorarios.sort((a,b) => a.dia_semana - b.dia_semana).map(s => `
        <div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
            <div>
                <p class="text-white font-bold text-sm">${s.nome_turma} <span class="text-slate-500 text-[10px] font-normal uppercase">(${s.sede})</span></p>
                <p class="text-blue-400 text-xs font-bold uppercase mt-1">🗓️ Toda ${diasNomes[s.dia_semana]}</p>
            </div>
            <button onclick="deleteData('horario_aulas', '${s.id}', 'allSchedules', renderHorariosFixos)" class="text-red-400 hover:text-red-300">🗑️</button>
        </div>
    `).join('');
}
    async function deleteData(tabela, id, arrayGlobal, renderFunc) {
    if(!confirm("Deseja excluir este item?")) return;
    showLoading("Excluindo...");
    const { error } = await _supabase.from(tabela).delete().eq('id', id);
    hideLoading();
    if(error) return showToast("Erro ao excluir", "error");
    
    window[arrayGlobal] = window[arrayGlobal].filter(item => item.id !== id);
    renderFunc();
    calcularPrevisaoTurma(); // Atualiza a aba diária se apagar um evento
}

function renderEventosGlobais() {

// --- ABA 1: O ALGORITMO DE PREVISÃO DIÁRIA ---
// --- ABA 1: O ALGORITMO DE PREVISÃO DIÁRIA ---
function calcularPrevisaoTurma() {
    const dateStr = document.getElementById('cal-dia-aula').value; // Formato YYYY-MM-DD
    const sede = document.getElementById('cal-dia-sede').value;
    const serie = document.getElementById('cal-dia-serie').value;
    const turma = document.getElementById('cal-dia-turma').value;
    const painel = document.getElementById('painel-previsao-aula');

    if (!dateStr || !sede || !serie || !turma) {
        painel.innerHTML = `<p class="text-slate-500 italic">Selecione Data, Sede, Série e Turma para carregar a projeção.</p>`;
        return;
    }

    // Criamos a data garantindo que o fuso horário não mude o dia
    const dataSelecionada = new Date(dateStr + 'T12:00:00');

    // 0. Verifica se a turma tem um horário fixo cadastrado
    const horario = allSchedules.find(s => s.sede === sede && s.nome_turma === turma && s.disciplina === currentLab);
    if (!horario) {
        painel.innerHTML = `<div class="bg-amber-900/20 p-6 rounded-xl border border-amber-500/30 w-full text-center">
            <h4 class="text-amber-400 font-bold text-lg mb-2">Turma sem Horário Fixo</h4>
            <p class="text-slate-300 text-sm mb-4">O algoritmo precisa saber em qual dia da semana essa turma tem aula.</p>
            <p class="text-xs text-amber-500 font-bold uppercase tracking-widest">Vá na aba "⏰ Horários Fixos" e defina.</p>
        </div>`;
        return;
    }

    // Verifica se a data que o professor clicou cai no mesmo dia da semana fixo da turma
    const diasNomes = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    let avisoDiaExtra = "";
    if (dataSelecionada.getDay() !== horario.dia_semana) {
        avisoDiaExtra = `<p class="text-amber-400 text-[10px] uppercase font-bold mb-4 border border-amber-500/30 bg-amber-900/20 py-1.5 px-3 rounded inline-block">⚠️ Atenção: O dia normal desta turma é ${diasNomes[horario.dia_semana]}</p>`;
    }

    // 1. Verifica se há log cadastrado EXATO para este dia
    const logHoje = allClassLogs.find(l => l.sede === sede && l.nome_turma === turma && l.data_aula === dateStr && l.disciplina === currentLab);

    if (logHoje) {
        let msg = logHoje.status === 'realizada' ? `<span class="text-emerald-400">✅ Aula Realizada (Lado ${logHoje.lado_presente})</span>` : `<span class="text-red-400">❌ Aula Cancelada</span>`;
        painel.innerHTML = `
            <div class="bg-slate-800 p-4 sm:p-6 rounded-xl border border-slate-600 w-full shadow-lg">
                ${avisoDiaExtra}
                <h4 class="text-white font-bold text-lg mb-2">Registro Já Existente</h4>
                <p class="text-sm font-bold bg-slate-900 py-3 rounded-lg border border-slate-700 mb-4">${msg}</p>
                <p class="text-xs text-slate-400 mb-4">Você pode sobrepor esse registro lançando um novo abaixo.</p>
                <div class="flex flex-col sm:flex-row gap-2 justify-center">
                    <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'realizada', 'A')" class="flex-1 bg-slate-700 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition-all">Lado A</button>
                    <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'realizada', 'B')" class="flex-1 bg-slate-700 hover:bg-purple-600 text-white font-bold py-3 rounded-lg transition-all">Lado B</button>
                    <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'cancelada', null)" class="flex-1 bg-slate-800 hover:bg-red-600 text-slate-400 hover:text-white font-bold py-3 rounded-lg border border-slate-600 hover:border-red-500 transition-all">🚫 Cancelar</button>
                </div>
            </div>`;
        return;
    }

    // 2. Verifica se a data selecionada cai em um Feriado/Evento
    const eventoAtivo = allEvents.find(ev => 
        ev.disciplina === currentLab && 
        dateStr >= ev.data_inicio && dateStr <= ev.data_fim &&
        (!ev.sede || ev.sede === sede) &&
        (!ev.serie || ev.serie === serie) &&
        (!ev.nome_turma || ev.nome_turma === turma)
    );
    
    if (eventoAtivo) {
        painel.innerHTML = `
            <div class="bg-amber-900/20 p-4 sm:p-6 rounded-xl border border-amber-500/30 w-full shadow-lg">
                <h4 class="text-amber-400 font-bold text-lg mb-2">Bloqueio de Calendário</h4>
                <p class="text-white text-sm">Identificamos o evento: <b>${eventoAtivo.titulo}</b>.</p>
                <p class="text-xs text-slate-400 mt-4 mb-4">Se a aula ocorreu como reposição, force o lançamento abaixo.</p>
                <div class="flex flex-col sm:flex-row gap-2 justify-center">
                    <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'realizada', 'A')" class="flex-1 bg-slate-700 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition-all">Lado A</button>
                    <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'realizada', 'B')" class="flex-1 bg-slate-700 hover:bg-purple-600 text-white font-bold py-3 rounded-lg transition-all">Lado B</button>
                </div>
            </div>`;
        return;
    }

    // 3. ALGORITMO INTELIGENTE: Projeção de Linha do Tempo
    const logsTurma = allClassLogs.filter(l => l.sede === sede && l.nome_turma === turma && l.disciplina === currentLab);
    const logsRealizados = logsTurma.filter(l => l.status === 'realizada' && l.data_aula < dateStr);
    
    let proximoLado = 'A';
    let numAula = 1;
    let msgExplicativa = "Primeira aula identificada para esta turma.";

    if (logsRealizados.length > 0) {
        // Pega a aula mais recente do passado
        logsRealizados.sort((a,b) => new Date(b.data_aula) - new Date(a.data_aula));
        const ultimoLog = logsRealizados[0];
        
        // Inicia o cursor de tempo no dia SEGUINTE à última aula
        let dataCursor = new Date(ultimoLog.data_aula + 'T12:00:00');
        dataCursor.setDate(dataCursor.getDate() + 1);
        
        let ladoSimulado = ultimoLog.lado_presente;
        let countAulas = logsRealizados.length; 

        // Avança dia a dia no tempo até chegar no dia que o professor selecionou
        while (dataCursor < dataSelecionada) {
            // Se o dia do cursor for o dia da semana oficial da turma, verificamos se teve aula
            if (dataCursor.getDay() === horario.dia_semana) {
                const cursorStr = dataCursor.toISOString().split('T')[0];
                
                // Vê se tinha feriado neste dia do passado
                const evt = allEvents.find(ev => 
                    ev.disciplina === currentLab && 
                    cursorStr >= ev.data_inicio && cursorStr <= ev.data_fim &&
                    (!ev.sede || ev.sede === sede) && (!ev.serie || ev.serie === serie) && (!ev.nome_turma || ev.nome_turma === turma)
                );
                
                // Vê se você marcou 'cancelada' neste dia do passado
                const isCanceled = logsTurma.some(l => l.data_aula === cursorStr && l.status === 'cancelada');
                
                // Se NÃO teve feriado e NÃO foi cancelada, significa que a fila andou!
                if (!evt && !isCanceled) {
                    ladoSimulado = ladoSimulado === 'A' ? 'B' : 'A';
                    countAulas++;
                }
            }
            dataCursor.setDate(dataCursor.getDate() + 1);
        }

        // Agora que a simulação chegou no dia selecionado, damos o último salto de Lado
        proximoLado = ladoSimulado === 'A' ? 'B' : 'A';
        numAula = countAulas + 1;
        
        const dtUltima = ultimoLog.data_aula.split('-').reverse().join('/');
        const saltos = numAula - logsRealizados.length - 1;
        msgExplicativa = `Última aula real: Lado ${ultimoLog.lado_presente} em ${dtUltima}. ${saltos > 0 ? `Projetando ${saltos} semanas puladas...` : 'Sequência normal.'}`;
    }

    // 4. Renderiza a projeção final com Botões Inteligentes
    painel.innerHTML = `
        <div class="bg-slate-900 p-4 sm:p-6 rounded-xl border border-slate-700 w-full shadow-2xl relative">
            ${avisoDiaExtra}
            <div class="flex items-center justify-between mb-2">
                <h4 class="text-blue-400 font-black tracking-widest text-[10px] uppercase">Inteligência do Calendário</h4>
                <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded shadow-lg shadow-blue-900/50 shrink-0 ml-2">AULA Nº ${numAula}</span>
            </div>
            <h2 class="text-white font-bold text-2xl sm:text-3xl mb-1">Previsão: Lado <span class="${proximoLado === 'A' ? 'text-blue-400' : 'text-purple-400'}">${proximoLado}</span></h2>
            <p class="text-slate-500 text-xs italic mb-6">${msgExplicativa}</p>
            
            <p class="text-xs text-slate-300 font-bold mb-3 uppercase tracking-wider">Confirme a Aula de Hoje:</p>
            <div class="flex flex-col sm:flex-row gap-2 justify-center">
                <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'realizada', 'A')" 
                    class="flex-1 ${proximoLado === 'A' ? 'bg-blue-600 hover:bg-blue-500 ring-4 ring-blue-500/30' : 'bg-slate-800 hover:bg-blue-600 opacity-60 hover:opacity-100 border border-slate-700'} text-white font-bold py-3 sm:py-4 rounded-xl transition-all duration-300">
                    Lado A
                </button>
                
                <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'realizada', 'B')" 
                    class="flex-1 ${proximoLado === 'B' ? 'bg-purple-600 hover:bg-purple-500 ring-4 ring-purple-500/30' : 'bg-slate-800 hover:bg-purple-600 opacity-60 hover:opacity-100 border border-slate-700'} text-white font-bold py-3 sm:py-4 rounded-xl transition-all duration-300">
                    Lado B
                </button>
                
                <button onclick="registrarAulaNoBanco('${dateStr}', '${sede}', '${serie}', '${turma}', 'cancelada', null)" 
                    class="flex-1 bg-slate-800 hover:bg-red-600 text-slate-400 hover:text-white font-bold py-3 sm:py-4 rounded-xl border border-slate-700 hover:border-red-500 transition-all duration-300">
                    🚫 Cancelar
                </button>
            </div>
        </div>
    `;
}
    async function registrarAulaNoBanco(dataAula, sede, serie, turma, status, lado) {
    showLoading("Registrando no diário...");

    const payload = {
        sede, serie, nome_turma: turma, data_aula: dataAula, 
        status, lado_presente: lado, disciplina: currentLab, atualizado_por: currentUser
    };

    try {
        const { data, error } = await _supabase.from('registro_diario_aulas')
            .upsert([payload], { onConflict: 'sede,serie,nome_turma,data_aula,disciplina' }).select();
        
        if (error) throw error;
        
        // Atualiza a memória apagando o antigo se existir e colocando o novo
        allClassLogs = allClassLogs.filter(l => !(l.sede === sede && l.nome_turma === turma && l.data_aula === dataAula && l.disciplina === currentLab));
        allClassLogs.push(data[0]);
        
        showToast("Registro efetuado!", "success");
        calcularPrevisaoTurma(); // Atualiza a tela instantaneamente

    } catch (err) {
        showToast("Erro ao registrar no banco", "error");
        console.error(err);
    } finally {
        hideLoading();
    }
}
