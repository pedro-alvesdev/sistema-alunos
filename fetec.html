/* Novo Loader Uiverse */
.loader {
  position: relative;
  width: 120px;
  height: 90px;
  margin: 0 auto;
}

.loader:before {
  content: "";
  position: absolute;
  bottom: 30px;
  left: 50px;
  height: 30px;
  width: 30px;
  border-radius: 50%;
  background: #3b82f6; /* Mudei para o seu Azul Maker para combinar com o layout */
  animation: loading-bounce 0.5s ease-in-out infinite alternate;
}

.loader:after {
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  height: 7px;
  width: 45px;
  border-radius: 4px;
  box-shadow: 0 5px 0 #334155, -35px 50px 0 #334155, -70px 95px 0 #334155; /* Escureci os degraus para combinar com o fundo escuro do seu overlay */
  animation: loading-step 1s ease-in-out infinite;
}

@keyframes loading-bounce {
  0% { transform: scale(1, 0.7); }
  40% { transform: scale(0.8, 1.2); }
  60% { transform: scale(1, 1); }
  100% { bottom: 140px; }
}

@keyframes loading-step {
  0% {
    box-shadow: 0 10px 0 rgba(0, 0, 0, 0),
            0 10px 0 #334155,
            -35px 50px 0 #334155,
            -70px 90px 0 #334155;
  }
  100% {

            -70px 90px 0 #334155,

}

// --- CARREGAMENTO DE DADOS (VERSÃO SINCRONIZADA TOTAL E SEM LIMITES) ---
async function refreshData() {
    showLoading("Sincronizando Banco de Dados...");
    const progressEl = document.getElementById('loader-progress');

    try {
        // 1. BUSCA DE VÍNCULOS (LAB_ASSIGNMENTS) - COM PAGINAÇÃO INFINITA
        progressEl.innerText = "Buscando grupos e lados...";
        let allFetchedAssignments = [];
        let pageAssign = 0;
        const pageSizeAssign = 1000;
        let lastAssignCount = 0;

        do {
            const { data: assignData, error: assignError } = await _supabase
                .from('lab_assignments')
                .select('*')
                .range(pageAssign * pageSizeAssign, (pageAssign + 1) * pageSizeAssign - 1);

            if (assignError) throw assignError;
            
            allFetchedAssignments = allFetchedAssignments.concat(assignData);
            lastAssignCount = assignData.length;
            pageAssign++;
        } while (lastAssignCount === pageSizeAssign);

        allAssignments = allFetchedAssignments; // ATRIBUIÇÃO DOS VÍNCULOS COMPLETOS

        // 2. BUSCA DE ALUNOS (PAGINAÇÃO)
        let allFetchedStudents = [];
        let page = 0;
        const pageSize = 1000;
        let lastCount = 0;

        do {
            const { data, error } = await _supabase
                .from('students')
                .select('*')
                .range(page * pageSize, (page + 1) * pageSize - 1);

            if (error) throw error;
            allFetchedStudents = allFetchedStudents.concat(data);
            lastCount = data.length;
            page++;
            progressEl.innerText = `Alunos carregados: ${allFetchedStudents.length}`;
        } while (lastCount === pageSize);

        allStudents = allFetchedStudents;

        // 3. BUSCA DE FREQUÊNCIA
        const dKey = selectedDate.toISOString().split('T')[0];
        const { data: attData } = await _supabase
            .from('attendance')
            .select('*')
            .eq('data_presenca', dKey);
        allAttendances = attData || [];

        // 4. ATUALIZAÇÃO DA INTERFACE
        if (currentScreen === 'management') applyFilters(); 
        else if (currentScreen === 'attendance') applyAttendanceFilters();
        else if (currentScreen === 'evaluation') applyEvalList();

        showToast("Sincronização concluída!", "success");
    } catch (err) {
        console.error("Erro crítico:", err);
        showToast("Falha na sincronização", "error");
    } finally {
        setTimeout(() => hideLoading(), 500);
    }
}

   function showLoading(msg = "Sincronizando Laboratório...") {
    const overlay = document.getElementById('loading-overlay');
    if (!overlay) return;
    document.getElementById('loader-progress').innerText = msg;
    
    overlay.style.display = "flex"; // Força a exibição
    overlay.classList.remove('hidden');
    setTimeout(() => { overlay.style.opacity = "1"; }, 10);
}

function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (!overlay) return;
    
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.classList.add('hidden');
        overlay.style.display = "none"; // Remove do caminho dos cliques
    }, 500);
}

        String(a.disciplina).toLowerCase() === String(currentLab).toLowerCase()
    ) || { lado: null, grupo: null };
}

    async function loadEvaluatorsList() {
    const { data, error } = await _supabase
        .from('evaluations_fetec')
        .select('nome_professor');

    if (error) return;

    // Filtra apenas nomes únicos e remove nulos
    const uniqueNames = [...new Set(data.map(item => item.nome_professor))].filter(Boolean).sort();
    
    const datalist = document.getElementById('evaluators-list');
    if (datalist) {
        datalist.innerHTML = uniqueNames.map(nome => `<option value="${nome}">`).join('');
    }
}

function updateResultFilters() {
    const sedeSel = document.getElementById('res-sede');
    const serieSel = document.getElementById('res-serie');
    const turmaSel = document.getElementById('res-turma');
    const grupoSel = document.getElementById('res-grupo');

    if (!sedeSel || !serieSel || !turmaSel || !grupoSel) return;

    const s = sedeSel.value;
    const sr = serieSel.value;
    const turmaAtual = turmaSel.value;
    const grupoAtual = grupoSel.value;

    // 1. Filtra alunos pela sede
    let listaFiltrada = allStudents.filter(x => x.sede === s);
    const series = [...new Set(listaFiltrada.map(x => x.serie))].filter(Boolean).sort();
    
    // Atualiza o select de Séries
    const serieAnterior = sr;
    serieSel.innerHTML = series.map(x => `<option value="${x}">${x}</option>`).join('');
    if (series.includes(serieAnterior)) {
        serieSel.value = serieAnterior;
    } else if (series.length > 0) {
        serieSel.value = series[0];
    }

    // 2. Filtra alunos pela Sede E Série atualizadas
    const srAtual = serieSel.value;
    listaFiltrada = listaFiltrada.filter(x => x.serie === srAtual);

    // Extrai e atualiza as Turmas
    const turmas = [...new Set(listaFiltrada.map(x => x.nome_turma))].filter(Boolean).sort();
    
    turmaSel.innerHTML = '<option value="todos">Todas as Turmas</option>' + 
                         turmas.map(t => `<option value="${t}">${t}</option>`).join('');
                         
    if (turmas.includes(turmaAtual)) {
        turmaSel.value = turmaAtual;
    }
    
    // 3. Atualiza os Grupos baseados na turma selecionada
    let listaTurma = listaFiltrada;
    if (turmaSel.value !== 'todos') {
        listaTurma = listaFiltrada.filter(x => x.nome_turma === turmaSel.value);
    }
    
    const grupos = [...new Set(listaTurma.map(x => {
        const assign = getStudentAssignment(x.ra);
        return assign.grupo;
    }))].filter(Boolean).sort((a,b) => a - b);
    
    grupoSel.innerHTML = '<option value="todos">Todos os Grupos</option>' + 
                         grupos.map(g => `<option value="${g}">Grupo ${g}</option>`).join('');
                         
    if (grupos.map(String).includes(String(grupoAtual))) {
        grupoSel.value = grupoAtual;
    }
}

async function generateRanking() {
    const sede = document.getElementById('res-sede').value;
    const serie = document.getElementById('res-serie').value;
    const turmaFiltro = document.getElementById('res-turma').value;
    const ladoFiltro = document.getElementById('res-lado').value;
    const grupoFiltro = document.getElementById('res-grupo').value; // NOVO FILTRO
    const container = document.getElementById('results-content');

    if (!sede || !serie) return;

    container.innerHTML = `
        <div class="text-center py-20">
            <div class="loader"></div>
            <p class="text-slate-500 italic mt-8">Consolidando resultados filtrados...</p>
        </div>`;

    try {
        let query = _supabase.from('evaluations_fetec').select('*')
            .eq('sede', sede)
            .eq('serie', serie)
            .eq('disciplina', currentLab);

        if (turmaFiltro !== 'todos') {
            query = query.eq('nome_turma', turmaFiltro);
        }

        let { data: evals, error } = await query;

        if (error) throw error;
        if (!evals || evals.length === 0) {
            container.innerHTML = `<p class="text-center py-20 text-slate-500 italic">Nenhuma avaliação encontrada para os filtros selecionados.</p>`;
            return;
        }

        // --- INÍCIO DA CORREÇÃO: FILTRO DE DESDUPLICAÇÃO ---
        // 1. Ordena da mais recente para a mais antiga
        evals.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        
        const evalsUnicos = [];
        const controleDuplicidade = new Set();

        evals.forEach(e => {
            // Cria uma chave única juntando o Projeto + Nome do Professor
            const projetoChave = e.ra_aluno ? e.ra_aluno : `G|${e.sede}|${e.nome_turma}|${e.lado}|${e.grupo}`;
            const profChave = `${projetoChave}|${e.nome_professor}`;

            // Se ainda não vimos essa combinação (é a nota mais nova), nós guardamos
            if (!controleDuplicidade.has(profChave)) {
                controleDuplicidade.add(profChave);
                evalsUnicos.push(e);
            }
        });

        // Substitui a lista suja pela limpa
        evals = evalsUnicos;
        // --- FIM DA CORREÇÃO ---

        // --- FILTROS DE LADO E GRUPO APLICADOS NOS DADOS OBTIDOS ---
        if (ladoFiltro !== 'todos') {
            evals = evals.filter(e => e.lado === ladoFiltro);
        }
        if (grupoFiltro !== 'todos') {
            evals = evals.filter(e => String(e.grupo) === String(grupoFiltro));
        }

        const processado = {};

        evals.forEach(e => {
            const key = e.ra_aluno ? e.ra_aluno : `GRUPO|${e.sede}|${e.nome_turma}|${e.lado}|${e.grupo}`;

            if (!processado[key]) {
                let identificacao = "";
                
                if (e.ra_aluno) {
                    const aluno = allStudents.find(s => String(s.ra) === String(e.ra_aluno));
                    identificacao = aluno ? aluno.nome_aluno : `RA: ${e.ra_aluno}`;
                } else {
                    // Pega apenas os alunos DESTA sala exata
                    const alunosDaTurma = allStudents.filter(s => 
                        s.sede === e.sede && 
                        s.serie === e.serie && 
                        s.nome_turma === e.nome_turma
                    );
                    
                    // Dentro desta sala, quem é deste grupo e lado?
                    const integrantes = alunosDaTurma.filter(s => {
                        const assign = getStudentAssignment(s.ra);
                        return String(assign.grupo) === String(e.grupo) && assign.lado === e.lado;
                    }).map(s => s.nome_aluno).sort().join(', ');
                    
                    identificacao = `
                        <div class="flex flex-col">
                            <span class="text-white font-bold uppercase tracking-tight">Lado ${e.lado || '?'} - Grupo ${e.grupo || '?'}</span>
                            <span class="text-[9px] text-slate-500 italic leading-tight">${integrantes || 'Nenhum aluno atribuído'}</span>
                        </div>`;
                }

                processado[key] = { 
                    key: key, 
                    nome: identificacao, 
                    avaliacoes: [], 
                    turma: e.nome_turma, 
                    apto: false 
                };
            }
            
            const n1 = parseFloat(e.nota_oralidade) || 0;
            const n2 = parseFloat(e.nota_postura) || 0;
            const n3 = parseFloat(e.nota_dominio) || 0; 
            
            processado[key].avaliacoes.push((n1 + n2 + n3) / 3);
            if (e.apto_fetec) processado[key].apto = true;
        });

        const rankingFinal = Object.values(processado).map(obj => {
            const soma = obj.avaliacoes.reduce((acc, n) => acc + n, 0);
            obj.mediaFinal = soma / obj.avaliacoes.length;
            return obj;
        }).sort((a, b) => b.mediaFinal - a.mediaFinal);
      window.lastRankingData = rankingFinal;

        const listaAptos = rankingFinal.filter(r => r.apto === true);
        const listaGeral = rankingFinal.filter(r => r.apto !== true);

        let htmlFinal = '';
        if (listaAptos.length > 0) htmlFinal += renderTabelaRanking(listaAptos, `🌟 Selecionados FETEC`, "border-amber-500/30 bg-amber-500/5", "text-amber-400");
        if (listaGeral.length > 0) htmlFinal += renderTabelaRanking(listaGeral, `📊 Classificação Geral`, "border-slate-700 bg-slate-900/50", "text-slate-400");

        container.innerHTML = htmlFinal || `<p class="text-center py-20 text-slate-500 italic">Nenhum aluno/grupo restou após os filtros.</p>`;

    } catch (err) {
        console.error("Erro no Ranking:", err);
        showToast("Erro ao processar ranking", "error");
    }
}

    function applyEvalList() {
    const sede = document.getElementById('ev-sede').value;
    const serie = document.getElementById('ev-serie').value;
    const turma = document.getElementById('ev-turma').value;
    const lado = document.getElementById('ev-lado').value;
    const grupoSel = document.getElementById('ev-grupo').value;
    const cont = document.getElementById('eval-container');

    if (!cont) return;

    cont.innerHTML = ''; 

    if (!sede || !serie || !turma) {
        cont.innerHTML = `<div class="col-span-full text-center py-20 bg-slate-900/50 rounded-2xl border border-dashed border-slate-700">
            <p class="text-white font-bold text-lg">Aguardando Filtros</p>
            <p class="text-slate-500 text-sm mt-2">Selecione <b>Sede, Série e Turma</b>.</p>
        </div>`;
        return; 
    }

    let listaBase = allStudents.filter(s => s.sede === sede && s.serie === serie && s.nome_turma === turma);
    
    const listaComVinculo = listaBase.map(aluno => {
        const vinculo = allAssignments.find(a => 
            a.ra_aluno === aluno.ra && 
            a.disciplina === currentLab
        ) || { lado: null, grupo: null };
        
        return { ...aluno, currentLado: vinculo.lado, currentGrupo: vinculo.grupo };
    });

    let listaFiltrada;
    if (lado === 'todos') {
        listaFiltrada = listaComVinculo;
    } else {
        listaFiltrada = listaComVinculo.filter(s => s.currentLado === lado);
    }
    
    if (grupoSel !== 'todos') {
        listaFiltrada = listaFiltrada.filter(s => String(s.currentGrupo) === grupoSel);
    }

    if (listaFiltrada.length === 0) {
        cont.innerHTML = `<div class="col-span-full text-center py-20 bg-slate-900/50 rounded-2xl border border-dashed border-slate-700">
            <p class="text-slate-500 italic text-sm">Nenhum aluno/grupo localizado.</p>
        </div>`;
        return;
    }

    if (serie.includes("6")) {
        cont.innerHTML = listaFiltrada
            .sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno))
            .map(aluno => {
                const infoGrupo = aluno.currentGrupo ? `Grupo ${aluno.currentGrupo}` : 'Sem Grupo';
                const labelLado = aluno.currentLado ? `Lado ${aluno.currentLado}` : 'S/L';
                // Enviamos currentLado como quarto parâmetro
                return renderEvalCard(`${aluno.nome_aluno}`, aluno.ra, aluno.currentGrupo, aluno.currentLado, `${labelLado} | ${infoGrupo}`);
            })
            .join('');
    } else {
        // Agrupamos usando Lado E Grupo para isolar completamente
        const gruposLado = {};
        
        listaFiltrada.forEach(s => {
            if (!s.currentGrupo || !s.currentLado) return; 
            const key = `${s.currentLado}-${s.currentGrupo}`;
            
            if (!gruposLado[key]) {
                gruposLado[key] = { lado: s.currentLado, grupo: s.currentGrupo, nomes: [] };
            }
            gruposLado[key].nomes.push(s.nome_aluno);
        });

        const chavesOrdenadas = Object.keys(gruposLado).sort();
        
        if (chavesOrdenadas.length === 0 && currentLab === 'ciencias') {
             cont.innerHTML = `<p class="col-span-full text-center py-10 text-slate-500 italic">Aguardando atribuição de grupos em Ciências...</p>`;
             return;
        }

        cont.innerHTML = chavesOrdenadas.map(k => {
            const g = gruposLado[k];
            const integrantes = g.nomes.sort().join(', ');
            return renderEvalCard(`LADO ${g.lado} - GRUPO ${g.grupo}`, null, g.grupo, g.lado, integrantes);
        }).join('');
    }
    
   setTimeout(() => {
       
        loadExistingEvaluations(); 
    }, 200);
}

   async function saveFetecEval(ra, grupo, ladoCard, cardId) {
    // 1. CAPTURA E VALIDAÇÃO DO AVALIADOR
    const profInput = document.getElementById('evaluator-name');
    const prof = profInput ? profInput.value.trim() : "";

    if (!prof || prof.length < 3) {
        showToast("⚠️ Digite seu nome completo no topo da página!", "error");
        if (profInput) profInput.focus();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
    }

    // 2. VALIDAÇÃO DE NOTAS (0 A 10)
    const inputs = document.querySelectorAll(`.eval-input-${cardId}`);
    let notaInvalida = false;
    
    inputs.forEach(i => {
        const v = parseFloat(i.value.toString().replace(',', '.'));
        if (isNaN(v) || v > 10 || v < 0) notaInvalida = true;
    });

    if (notaInvalida) {
        showToast("⚠️ Notas inválidas! Use valores de 0 a 10.", "error");
        return;
    }

    // 3. FEEDBACK VISUAL DE PROCESSAMENTO
    const card = document.getElementById(`card-${cardId}`);
    const btn = card.querySelector('button');
    const originalBtnText = btn.innerText;
    
    btn.disabled = true;
    btn.innerText = "⏳ Sincronizando...";
    card.style.opacity = "0.7";

    // 4. TRATAMENTO DE NOTAS (Conversão segura de vírgula para ponto)
    const getNotaLimpa = (sub) => {
        const input = document.getElementById(`nota-${cardId}-${sub}`);
        if (!input || !input.value) return 0;
        const valor = parseFloat(input.value.toString().replace(',', '.'));
        return isNaN(valor) ? 0 : valor;
    };

    // 5. MONTAGEM DOS DADOS
    const sedeAtual = document.getElementById('ev-sede').value;
    const serieAtual = document.getElementById('ev-serie').value;
    const turmaAtual = document.getElementById('ev-turma').value;
    
    // Pega o lado direto do CARD e não mais do select global
    const ladoReal = (ladoCard && ladoCard !== 'null' && ladoCard !== 'undefined') ? ladoCard : null;

    const payload = {
        ra_aluno: (ra && ra !== 'null' && ra !== 'undefined') ? ra : null,
        grupo: (grupo && grupo !== 'null' && grupo !== 'undefined') ? parseInt(grupo) : null,
        lado: ladoReal, // <-- Correção principal aqui
        nome_professor: prof,
        disciplina: currentLab,
        data_eval: new Date().toISOString().split('T')[0],
        
        nota_oralidade: getNotaLimpa('Oralidade'),
        nota_postura: getNotaLimpa('Postura'),
        nota_dominio: getNotaLimpa('Dominio'),
        nota_clareza: 0, 
        nota_transmissao: 0,
        
        observacao: document.getElementById(`obs-${cardId}`).value,
        apto_fetec: document.getElementById(`apto-${cardId}`).checked,
        sede: sedeAtual,
        serie: serieAtual,
        nome_turma: turmaAtual,
        usuario_sistema: currentUser
    };

    // 6. ENVIO AO SUPABASE (UPSERT)
    try {
        const { error: dbError } = await _supabase
            .from('evaluations_fetec')
            .upsert([payload], { 
                onConflict: 'nome_professor, ra_aluno, grupo, lado, nome_turma, disciplina, sede' 
            });

        if (dbError) throw dbError;

        showToast("✅ Avaliação Sincronizada!", "success");
        
        // Feedback de sucesso no Card
        card.classList.add('border-emerald-500/50');
        card.style.opacity = "1";
        btn.disabled = false;
        btn.innerText = "🔄 Atualizar Nota";
        btn.classList.replace('bg-emerald-600', 'bg-blue-600');
        
        profInput.readOnly = true;
        profInput.classList.add('bg-slate-800', 'text-slate-400');

        focusNextCard(cardId);

    } catch (error) {
        console.error("Erro Supabase:", error);
        showToast("❌ Erro ao salvar: " + error.message, "error");
        btn.disabled = false;
        btn.innerText = originalBtnText;
        card.style.opacity = "1";
    }
}

    function focusNextCard(currentId) {
    // 1. Obtém todos os cards de avaliação que estão na tela no momento
    const allCards = Array.from(document.querySelectorAll('[id^="card-"]'));
    
    // 2. Encontra o índice do card que acabou de ser salvo
    const currentIndex = allCards.findIndex(card => card.id === `card-${currentId}`);
    
    // 3. Verifica se existe um próximo card
    if (currentIndex !== -1 && currentIndex < allCards.length - 1) {
        const nextCard = allCards[currentIndex + 1];

        // 4. Scroll Suave até o próximo card
        nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // 5. Feedback Visual (Piscar levemente o próximo card)
        nextCard.classList.add('ring-2', 'ring-blue-500', 'ring-offset-2', 'ring-offset-slate-900');
        setTimeout(() => {
            nextCard.classList.remove('ring-2', 'ring-blue-500');
        }, 1000);

        // 6. Foco no primeiro input de nota do próximo card
        const firstInput = nextCard.querySelector('input[type="number"]');
        if (firstInput) {
            setTimeout(() => firstInput.focus(), 600); // Aguarda o scroll terminar
        }
    } else {
        showToast("🎉 Fim da lista de avaliação!", "success");
    }
}

   async function loadExistingEvaluations() {
    const sede = document.getElementById('ev-sede').value;
    const turma = document.getElementById('ev-turma').value;
    const prof = document.getElementById('evaluator-name').value.trim();

    if (!prof) return;

    const { data, error } = await _supabase
        .from('evaluations_fetec')
        .select('*')
        .eq('sede', sede)
        .eq('nome_turma', turma)
        .eq('nome_professor', prof)
        .eq('disciplina', currentLab); 

    if (error) return;

    if (data && data.length > 0) {
        data.forEach(eval => {
            // Agora o ID inclui o lado na hora de puxar os dados
            const id = eval.ra_aluno || `g${eval.grupo}-${eval.lado}`;
            const card = document.getElementById(`card-${id}`);

            }
        });

    function calculateLiveMedia(cardId) {
    const inputs = document.querySelectorAll(`.eval-input-${cardId}`);
    let soma = 0;
    let preenchidos = 0;
    let temErro = false;

    inputs.forEach(input => {
        let val = parseFloat(input.value.toString().replace(',', '.'));
        
        if (val > 10) {
            temErro = true;
            input.classList.add('bg-red-900/50', 'border-red-500', 'text-red-200');
        } else {
            input.classList.remove('bg-red-900/50', 'border-red-500', 'text-red-200');
            if (!isNaN(val)) {
                soma += val;
                preenchidos++;
            }
        }
    });

    const display = document.getElementById(`live-media-${cardId}`);
    if (display) {
        if (temErro) {
            display.innerText = "!!";
            display.className = "text-xl font-black text-red-500 animate-bounce";
        } else {
            // DIVISOR ALTERADO PARA 3
            const media = preenchidos > 0 ? (soma / 3) : 0;
            display.innerText = media.toFixed(1);
            
            if (media >= 9) display.className = "text-xl font-black text-yellow-400 leading-none";
            else if (media < 5 && media > 0) display.className = "text-xl font-black text-red-400 leading-none";
            else display.className = "text-xl font-black text-emerald-400 leading-none";
        }
    }
}

    function populateInitialEvalFilters() {
    const sedes = [...new Set(allStudents.map(s => s.sede))].sort();
    const series = [...new Set(allStudents.map(s => s.serie))].sort();
    
    document.getElementById('ev-sede').innerHTML = sedes.map(s => `<option value="${s}">${s}</option>`).join('');
    document.getElementById('ev-serie').innerHTML = series.map(s => `<option value="${s}">${s}</option>`).join('');
    
    // Tenta carregar filtros persistentes
    const lastFilters = loadPersistentEvalFilters();
    if (lastFilters) {
        if (sedes.includes(lastFilters.sede)) document.getElementById('ev-sede').value = lastFilters.sede;
        if (series.includes(lastFilters.serie)) document.getElementById('ev-serie').value = lastFilters.serie;
    }

    updateEvalFilters(); // Dispara o preenchimento de turmas e grupos

    // Se houver filtros salvos para turma, lado e grupo, aplica-os após o updateEvalFilters
    if (lastFilters) {
        setTimeout(() => {
            const tSel = document.getElementById('ev-turma');
            if (Array.from(tSel.options).some(opt => opt.value === lastFilters.turma)) {
                tSel.value = lastFilters.turma;
            }
            document.getElementById('ev-lado').value = lastFilters.lado || 'todos';
            document.getElementById('ev-grupo').value = lastFilters.grupo || 'todos';
            applyEvalList();
        }, 100);
    }
}

function updateEvalFilters() {
    const s = document.getElementById('ev-sede').value;
    const sr = document.getElementById('ev-serie').value;
    
    // 1. Filtra a base de alunos conforme Sede e Série selecionadas
    const listaFiltrada = allStudents.filter(x => x.sede === s && x.serie === sr);
    
    // 2. Extrai Turmas e Grupos Únicos desta combinação
    const turmas = [...new Set(listaFiltrada.map(x => x.nome_turma))].sort();
    const grupos = [...new Set(listaFiltrada.filter(x => x.grupo).map(x => x.grupo))].sort((a,b) => a - b);

    // 3. Atualiza o Select de Turmas
    const selectTurma = document.getElementById('ev-turma');
    const turmaAnterior = selectTurma.value; // Tenta manter a turma se ela ainda existir na nova série
    
    selectTurma.innerHTML = turmas.map(t => `<option value="${t}">${t}</option>`).join('');
    
    // Se a turma selecionada antes ainda existe na nova série, mantém. Senão, pega a primeira.
    if (turmas.includes(turmaAnterior)) {
        selectTurma.value = turmaAnterior;
    }

    // 4. Atualiza o Select de Grupos
    document.getElementById('ev-grupo').innerHTML = '<option value="todos">Todos os Grupos</option>' + 
                                                     grupos.map(g => `<option value="${g}">Grupo ${g}</option>`).join('');
    
    // 5. Atualiza a lista de cards na tela
    applyEvalList();
}

   async function showEvaluationLog(key) {
    const modal = document.getElementById('log-modal');
    const body = document.getElementById('log-table-body');
    const title = document.getElementById('log-title');
    const subtitle = document.getElementById('log-subtitle');

    if (!modal) return console.error("Modal de log não encontrado!");

    // Estado de carregamento
    body.innerHTML = `<tr><td colspan="5" class="p-10 text-center italic text-slate-500">Buscando histórico de jurados...</td></tr>`;
    modal.classList.remove('hidden');

    try {
        // 1. Identifica se a busca é por RA ou pela nossa nova chave de Grupo
        const isGroup = key.includes('GRUPO|');
        let query = _supabase.from('evaluations_fetec').select('*').eq('disciplina', currentLab);

        if (isGroup) {
            // Fatiamos a chave usando a barra vertical
            const parts = key.split('|'); // ['GRUPO', Sede, Turma, Lado, GNum]
            const sede = parts[1];
            const turma = parts[2];
            const lado = parts[3];
            const grupoNum = parts[4];

            query = query.eq('sede', sede)
                         .eq('nome_turma', turma)
                         .eq('lado', lado)
                         .eq('grupo', grupoNum);
        } else {
            query = query.eq('ra_aluno', key);
        }

        const { data, error } = await query;

        if (error) throw error;

        if (!data || data.length === 0) {
            body.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-500">Nenhum registro detalhado para este projeto.</td></tr>`;

                            <div class="bg-slate-800 rounded p-1" title="Postura">P: ${nPost.toFixed(1)}</div>
                            <div class="bg-slate-800 rounded p-1" title="Domínio">D: ${nDom.toFixed(1)}</div>

    async function handleExcelUpload() {
      const file = document.getElementById('excel-upload').files[0];
      if (!file) return showToast("Selecione um arquivo!", "error");

      const btn = document.getElementById('upload-btn');
      const prog = document.getElementById('import-progress');
      const fill = document.getElementById('progress-fill');
      const txt = document.getElementById('progress-text');

      btn.disabled = true;
      prog.classList.remove('hidden');

      const reader = new FileReader();
      reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

        for (let i = 0; i < jsonData.length; i++) {
          const row = jsonData[i];
          const student = {
            sede: String(row.SEDE || ''),
            serie: String(row.SERIE || ''),
            turno: String(row.TURNO || ''),
            curso: String(row.CURSO || ''),
            nome_turma: String(row.NOME_TURMA || ''),
            ra: String(row.RA || ''),
            nome_aluno: String(row.NOME_ALUNO || ''),
            usuario: currentUser
          };

          await _supabase.from('students').upsert(student, { onConflict: 'ra' });
          
          const pct = Math.round(((i + 1) / jsonData.length) * 100);
          fill.style.width = pct + "%";
          txt.innerText = `Importando: ${i+1} de ${jsonData.length}`;
        }
        showToast("Sucesso!", "success");
        await refreshData();
        btn.disabled = false;
        prog.classList.add('hidden');
      };
      reader.readAsArrayBuffer(file);
    }

  async function togglePresence(ra, val) {
    const dKey = selectedDate.toISOString().split('T')[0];
    const student = allStudents.find(x => x.ra === ra);
    if (!student) return;

    const { error } = await _supabase.from('attendance').upsert({
        ra: ra, 
        data_presenca: dKey, 
        disciplina: currentLab, // REGISTRA O LAB ATUAL
        presente: val, 
        nome_aluno: student.nome_aluno, 
        nome_turma: student.nome_turma, 
        usuario: currentUser
    }, { onConflict: 'ra,data_presenca,disciplina' });

    if (error) {
        showToast("Erro ao salvar presença", "error");
    } else {
        // Atualiza memória local
        const index = allAttendances.findIndex(a => a.ra === ra && a.data_presenca === dKey && a.disciplina === currentLab);
        if (index !== -1) allAttendances[index].presente = val;
        else allAttendances.push({ ra, data_presenca: dKey, disciplina: currentLab, presente: val });
        
        showToast(`${val ? 'Presente' : 'Ausente'} em ${currentLab.toUpperCase()}`, "success");
    }
}

async function massAssign(field, value) {

    showLoading("Gravando alterações...");

            const s = allStudents.find(x => String(x.ra).trim() === String(raSelecionado).trim());
            if (!s) return null;

            // Usa a função segura que criamos na etapa anterior
            const currentAssign = getStudentAssignment(s.ra);

            return {
                ra_aluno: String(s.ra).trim(),
                disciplina: currentLab,
                lado: field === 'parte_sala' ? value : currentAssign.lado,
                grupo: field === 'grupo' ? (value ? parseInt(value) : null) : currentAssign.grupo
            };
        }).filter(p => p !== null);

        // A GRANDE TRAVA: Se a lista estiver vazia, ele cancela e te avisa!
        if (payloads.length === 0) {
            alert("❌ Erro grave: Nenhum aluno válido foi encontrado para envio.");

        }

            .from('lab_assignments')
            .upsert(payloads, { onConflict: 'ra_aluno,disciplina' })
            .select(); // <--- ADICIONE ESTA LINHA AQUI!

        showToast("✅ Salvo no banco!", "success");

    } catch (err) {

    } finally {
        hideLoading();
    }

    function applyFilters() {
    const sede = document.getElementById('filter-sede')?.value || 'todos';
    const serie = document.getElementById('filter-serie')?.value || 'todos';
    const turma = document.getElementById('filter-turno')?.value || 'todos';
    const parte = document.getElementById('filter-parte-sala')?.value || 'todos';
    const search = document.getElementById('search-nome')?.value.toLowerCase() || '';

    // 1. Atualiza os dropdowns dinamicamente para encadeamento
    updateFilterOptions('management', { sede, serie });

    // 2. Filtra a lista principal
    filteredStudents = allStudents.filter(s => {
        const mSede = sede === 'todos' || s.sede === sede;
        const mSerie = serie === 'todos' || s.serie === serie;
        const mTurma = turma === 'todos' || s.nome_turma === turma;
        const mSearch = s.nome_aluno.toLowerCase().includes(search);
        
        // --- BUSCA O VÍNCULO DO LAB ATUAL PARA O FILTRO ---
       const assign = getStudentAssignment(s.ra);

        let mParte = true;
        if (parte === 'nao-atribuido') {
            mParte = !assign.lado; // Verifica se o lado está vazio no lab atual
        } else if (parte !== 'todos') {
            mParte = assign.lado === parte; // Filtra pelo lado A ou B do lab atual
        }
        
        return mSede && mSerie && mTurma && mSearch && mParte;
    });

    renderStudentList();
}

   function updateFilterOptions(ctx, currentFilters = {}) {
        const prefix = ctx === 'management' ? 'filter' : 'attendance-filter';
        
        // Base de dados para os dropdowns (respeita o encadeamento)
        let baseParaDropdowns = allStudents;
        
        // Se uma sede foi selecionada, as séries devem ser apenas daquela sede
        if (currentFilters.sede && currentFilters.sede !== 'todos') {
            baseParaDropdowns = baseParaDropdowns.filter(s => s.sede === currentFilters.sede);
        }
        
        // Se uma série foi selecionada, as turmas devem ser apenas daquela série
        if (currentFilters.serie && currentFilters.serie !== 'todos') {
            baseParaDropdowns = baseParaDropdowns.filter(s => s.serie === currentFilters.serie);
        }

        const sedes = [...new Set(allStudents.map(s => s.sede))].sort(); 
        const series = [...new Set(baseParaDropdowns.map(s => s.serie))].sort();
        const turmas = [...new Set(baseParaDropdowns.map(s => s.nome_turma))].sort();
        
        const populate = (id, list, selectedValue) => {
            const el = document.getElementById(prefix + id);
            if(el) {
                const previousValue = selectedValue || el.value;
                el.innerHTML = '<option value="todos">Todas</option>' + 
                               list.map(x => `<option value="${x}">${x}</option>`).join('');
                
                // Mantém o valor se ele ainda existir na nova lista filtrada
                if (list.includes(previousValue)) el.value = previousValue;
                else el.value = 'todos';
            }
        };

        // Aplica a filtragem nos selects de acordo com o contexto
        populate('-sede', sedes, currentFilters.sede);
        populate('-serie', series, currentFilters.serie);
        populate('-turno', turmas, currentFilters.turma);
    }

                                <button onclick="openEditModal('${s.ra}')" title="Editar" class="text-blue-400 hover:text-blue-300 mr-3 transition-colors">
                                    ✏️
                                </button>
                                ${currentLab === 'maker' ? `
                                    <button onclick="deleteStudent('${s.id}')" title="Excluir" class="text-red-400 hover:text-red-300 transition-colors">
                                        🗑️
                                    </button>
                                ` : '<span title="Apenas Admin Maker pode excluir" class="opacity-20 grayscale cursor-not-allowed">🗑️</span>'}
                            </td>
                        </tr>`;
                    }).join('')}
            </tbody>
        </table>`;
}

     function openEditModal(ra) {
    // 1. Localiza os dados fixos do aluno na lista global
    const s = allStudents.find(x => x.ra === ra);
    if (!s) return showToast("Aluno não encontrado", "error");

    // 2. Busca o vínculo específico do laboratório atual (Maker ou Ciências)
    const assign = allAssignments.find(a => 
        a.ra_aluno === ra && 
        a.disciplina === currentLab
    ) || { lado: null, grupo: null };

    // 3. Atualiza o título do Modal conforme o contexto
    document.getElementById('modal-title').innerText = `Editar Aluno (${currentLab.toUpperCase()})`;
    
    // 4. Preenche os dropdowns de Sede/Série/Turma com os dados do aluno
    populateModalDropdowns(s);
    
    // 5. Preenche os campos de texto e selects do formulário
    document.getElementById('m-nome').value = s.nome_aluno;
    document.getElementById('m-ra').value = s.ra;
    document.getElementById('m-parte').value = assign.lado || '';
    document.getElementById('m-grupo').value = assign.grupo || '';

    // --- 6. LÓGICA DE PERMISSÕES (TRAVA DE SEGURANÇA) ---
    const isCiencias = (currentLab === 'ciencias');

    // Campos Cadastrais: Bloqueados se for Ciências, Liberados se for Maker
    const camposFixos = ['m-nome', 'm-ra', 'm-sede', 'm-serie', 'm-turma'];
    camposFixos.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.disabled = isCiencias;
            if (isCiencias) {
                el.classList.add('opacity-50', 'cursor-not-allowed', 'bg-slate-800');
            } else {
                el.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-800');
            }
        }
    });

    // Campos de Atribuição (Lado e Grupo): SEMPRE LIBERADOS para ambos os labs
    const camposLab = ['m-parte', 'm-grupo'];
    camposLab.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.disabled = false; // Garante que Lado A/B esteja disponível
            el.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-800');
        }
    });

    // 7. Exibe o modal na tela
    document.getElementById('student-modal').classList.remove('hidden');
}

    function openAddModal() {
    document.getElementById('modal-title').innerText = "Adicionar Aluno";
    document.getElementById('student-form').reset();
    
    // Preenche os dropdowns com as opções disponíveis (sem seleção prévia)
    populateModalDropdowns();
    
    document.getElementById('student-modal').classList.remove('hidden');
}

    // Função para selecionar ou desmarcar todos os visíveis no modal
function quickSelect(status) {
    const checkboxes = document.querySelectorAll('.student-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = status;
        const ra = cb.getAttribute('data-ra');
        if (status) selectedStudentsForAssign.add(ra);
        else selectedStudentsForAssign.delete(ra);
    });
}

function quickSelectHalf() {
    quickSelect(false); // Limpa tudo primeiro
    const checkboxes = document.querySelectorAll('.student-checkbox');
    const half = Math.ceil(checkboxes.length / 2);
    
    for (let i = 0; i < half; i++) {
        checkboxes[i].checked = true;
        const ra = checkboxes[i].getAttribute('data-ra');
        selectedStudentsForAssign.add(ra);
    }
}

    // Função para abrir o modal e carregar apenas os alunos que estão filtrados na tela
    function openAssignRoomModal() {
    const listCont = document.getElementById('assign-list');
    if (!listCont) return;

    // Limpa a seleção anterior ao abrir o modal
    selectedStudentsForAssign.clear(); 

    if (filteredStudents.length === 0) {
        listCont.innerHTML = `<p class="text-slate-500 text-center py-4 italic">Nenhum aluno filtrado na tela para atribuir.</p>`;
    } else {
        // Ordena a lista filtrada por nome para facilitar a visualização
        const sortedList = [...filteredStudents].sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno));
        
        // Inserção dos botões de seleção rápida e cabeçalho informativo
        listCont.innerHTML = `
            <div class="flex flex-wrap gap-2 mb-4 sticky top-0 bg-slate-900 p-2 rounded-lg z-10 border border-slate-700 shadow-md">
                <button onclick="quickSelect(true)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-1.5 px-2 rounded text-[10px] font-black uppercase tracking-wider">✅ Todos</button>
                <button onclick="quickSelectHalf()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-1.5 px-2 rounded text-[10px] font-black uppercase tracking-wider">🌓 Metade</button>
                <button onclick="quickSelect(false)" class="flex-1 bg-red-900/30 text-red-400 py-1.5 px-2 rounded text-[10px] font-black uppercase tracking-wider border border-red-900/50">❌ Limpar</button>
            </div>
            
            <div id="check-list-container" class="space-y-1">
                ${sortedList.map(s => {
                    // Busca o vínculo atual do aluno para o laboratório logado (Maker ou Ciências)
                   // Substitua dentro da função openAssignRoomModal()
const assign = getStudentAssignment(s.ra);
                    const hasData = assign.lado || assign.grupo;

                    return `
                        <div class="flex items-center gap-3 p-2 border-b border-slate-700/50 hover:bg-slate-700/30 transition-all">
                            <input type="checkbox" 
       class="student-checkbox w-4 h-4 cursor-pointer accent-blue-500" 
       data-ra="${s.ra}"
       onchange="this.checked ? selectedStudentsForAssign.add('${s.ra}') : selectedStudentsForAssign.delete('${s.ra}')">
                            
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between flex-1 gap-1">
                                <div class="flex flex-col">
                                    <span class="text-white text-sm font-medium leading-tight">${s.nome_aluno}</span>
                                    <span class="text-slate-500 text-[9px] uppercase tracking-tighter">${s.nome_turma} | RA: ${s.ra}</span>
                                </div>

                                <div class="flex items-center">
                                    <span class="text-[10px] px-2 py-0.5 rounded font-bold ${hasData ? 'bg-blue-900/40 text-blue-400 border border-blue-800/30' : 'text-slate-600 italic'}">
                                        ${hasData ? 
                                            `${assign.lado || '-'}${assign.grupo ? ' / G'+assign.grupo : ''}` : 
                                            'sem grupo'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }
    
    // Abre o modal removendo a classe hidden
    document.getElementById('assign-room-modal').classList.remove('hidden');
}

    // --- INICIALIZAÇÃO ---
   window.onload = () => {
    const isAuth = sessionStorage.getItem('isAuth');
    
    if (isAuth === 'true') {
        // Se já estava logado, carrega os dados e mostra a gestão
        isAuthenticated = true;
        currentLab = sessionStorage.getItem('currentLab') || 'maker';
        currentUser = sessionStorage.getItem('userRole') || 'admin_maker';
        
        // O refreshData chamará o showLoading() automaticamente
        refreshData().then(() => {
            switchScreen('management');
        });
    } else {
        // Se NÃO está logado, apenas mostra a tela de login
        // SEM chamar o refreshData antes da hora
        showLoginScreen();
        hideLoading(); // Garante que o overlay suma se aparecer por erro
    }
};

    // (Funções de utilidade como formatDate, handleLogout, close modals seguem o padrão)
    function formatDate(d) { return d.toLocaleDateString('pt-BR'); }
    function closeStudentModal() { document.getElementById('student-modal').classList.add('hidden'); }
    function closeAssignRoomModal() { document.getElementById('assign-room-modal').classList.add('hidden'); }
   function handleLogout() {
    // 1. Limpa todos os dados da sessão do navegador
    sessionStorage.clear(); 
    
    // 2. Reseta as variáveis de estado globais para o padrão de segurança
    isAuthenticated = false;
    currentUser = null;
    currentLab = 'maker'; // Volta para o padrão
    currentScreen = 'login';
    
    // 3. Limpa listas temporárias da memória
    allStudents = [];
    allAssignments = [];
    allAttendances = [];
    
    // 4. Feedback visual e redirecionamento
    showToast("Sessão encerrada com sucesso", "info");
    showLoginScreen();
    
    // 5. Opcional: Força um recarregamento da página para garantir limpeza total do cache
    // window.location.reload(); 
}

        const toast = document.createElement('div');
        toast.className = `toast ${t === 'success' ? 'bg-green-600' : 'bg-blue-600'}`;
        toast.innerText = m;
        document.body.appendChild(toast);
