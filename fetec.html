    // --- CARREGAMENTO DE DADOS ---
async function refreshData() {
    showLoading("Iniciando sincronização...");
    const progressEl = document.getElementById('loader-progress');

    try {
        let allFetchedStudents = [];
        let page = 0;
        const pageSize = 1000;
        let lastCount = 0;

        // --- BUSCA DE ALUNOS ---
        do {
            // Buscamos os alunos. Nota: removi o 'count: exact' temporariamente para acelerar a resposta do banco
            const { data, error } = await _supabase
                .from('students')
                .select('*')
                .range(page * pageSize, (page + 1) * pageSize - 1);

            if (error) {
                console.error("Erro Supabase Alunos:", error);
                break; 
            }

            if (!data) break;

            allFetchedStudents = allFetchedStudents.concat(data);
            lastCount = data.length;
            page++;

            progressEl.innerText = `Carregando Alunos... ${allFetchedStudents.length}`;
        } while (lastCount === pageSize);

        allStudents = allFetchedStudents;

        // --- BUSCA DE VÍNCULOS ---
        progressEl.innerText = "Configurando Laboratórios...";
        const { data: assignData, error: assignError } = await _supabase
            .from('lab_assignments')
            .select('*');

        if (!assignError) allAssignments = assignData;

        // --- BUSCA DE FREQUÊNCIA ---
        progressEl.innerText = "Sincronizando Presenças...";
        const dKey = selectedDate.toISOString().split('T')[0];
        const { data: attData, error: attError } = await _supabase
            .from('attendance')
            .select('*')
            .eq('data_presenca', dKey);

        if (!attError) allAttendances = attData;

        // --- FINALIZAÇÃO ---
        progressEl.innerText = "Renderizando interface...";
        
        // Aplica os filtros para garantir que a lista 'filteredStudents' seja populada
        if (currentScreen === 'management') {
            applyFilters(); 
        } else if (currentScreen === 'attendance') {
            applyAttendanceFilters();
        }

    } catch (err) {
        console.error("Erro crítico no refreshData:", err);
        showToast("Erro de conexão. Tente recarregar.", "error");
    } finally {
        // GARANTIA: Esconde o loading de qualquer jeito após 1 segundo
        setTimeout(() => {
            hideLoading();
        }, 1000);
    }
}

   function showLoading(msg = "Sincronizando Laboratório...") {
    const overlay = document.getElementById('loading-overlay');
    if (!overlay) return;
    document.getElementById('loader-progress').innerText = msg;
    overlay.classList.remove('hidden');
    overlay.style.opacity = "1";
    overlay.style.display = "flex"; // Garante que o flex seja aplicado
}

function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (!overlay) return;
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.classList.add('hidden');
        overlay.style.display = "none";
    }, 500);
}

async function generateRanking() {
    const sede = document.getElementById('res-sede').value;
    const serie = document.getElementById('res-serie').value;
    const container = document.getElementById('results-content');

    // 1. Busca avaliações filtrando pela SEDE, SÉRIE e pela DISCIPLINA ATUAL
    const { data: evals, error } = await _supabase
        .from('evaluations_fetec')
        .select('*')
        .eq('sede', sede)
        .eq('serie', serie)
        .eq('usuario_sistema', currentUser.includes('maker') ? 'admin_maker' : 'admin_ciencias'); 
        // Ou use uma lógica baseada em currentLab se você salvou a disciplina no payload de salvar nota

    if (error) return console.error(error);

    // 2. Processamento (Agrupar por Aluno ou Grupo)
    const processado = {};
    evals.forEach(e => {
        const key = e.ra_aluno || `Grupo ${e.grupo} (${e.nome_turma})`;
        if (!processado[key]) {
            processado[key] = { 
                nome: key, 
                avaliacoes: [], 
                apto: false,
                turma: e.nome_turma
            };
        }
        const mediaIndiv = (e.nota_oralidade + e.nota_postura + e.nota_clareza + e.nota_dominio + e.nota_transmissao) / 5;
        processado[key].avaliacoes.push({ prof: e.nome_professor, media: mediaIndiv });
        if (e.apto_fetec) processado[key].apto = true;
    });

    const ranking = Object.values(processado).map(obj => {
        const somaMedias = obj.avaliacoes.reduce((acc, a) => acc + a.media, 0);
        obj.mediaFinal = somaMedias / obj.avaliacoes.length;
        return obj;
    }).sort((a, b) => b.mediaFinal - a.mediaFinal);

    // 3. Renderização das Tabelas (Com cores dinâmicas)
    const colorClass = currentLab === 'maker' ? 'text-blue-400' : 'text-emerald-400';
    
    container.innerHTML = `
        <div class="text-center mb-4 no-print">
            <span class="px-4 py-1 rounded-full border border-slate-700 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                Exibindo Resultados de: ${currentLab.toUpperCase()}
            </span>
        </div>
        
        <section class="bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-2xl">
            <h2 class="${colorClass} font-bold mb-4 uppercase text-sm tracking-widest">📋 Ranking de Notas</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs text-slate-300">
                    <thead>
                        <tr class="border-b border-slate-700">
                            <th class="p-2">Equipe/Aluno</th>
                            <th class="p-2">Turma</th>
                            <th class="p-2">Média Final</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${ranking.map((r, idx) => `
                            <tr class="border-b border-slate-800 hover:bg-slate-800/30">
                                <td class="p-2 font-bold text-white">${idx + 1}º - ${r.nome}</td>
                                <td class="p-2">${r.turma}</td>
                                <td class="p-2 font-black ${colorClass}">${r.mediaFinal.toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </section>
    `;
}

    function applyEvalList() {
    const sede = document.getElementById('ev-sede').value;
    const serie = document.getElementById('ev-serie').value;
    const turma = document.getElementById('ev-turma').value;
    const lado = document.getElementById('ev-lado').value;
    const grupoSel = document.getElementById('ev-grupo').value;
    const cont = document.getElementById('eval-container');

    // 1. Filtra a lista base de alunos (Dados Fixos)
    let listaBase = allStudents.filter(s => s.sede === sede && s.serie === serie && s.nome_turma === turma);
    
    // 2. BUSCA DINÂMICA: Mapeia cada aluno ao seu grupo no laboratório atual
    // Criamos uma lista de objetos que une o Aluno ao seu Vínculo atual
    const listaComVinculo = listaBase.map(aluno => {
        const vinculo = allAssignments.find(a => 
            a.ra_aluno === aluno.ra && 
            a.disciplina === currentLab // Filtra por Maker ou Ciências
        ) || { lado: null, grupo: null };
        
        return { ...aluno, currentLado: vinculo.lado, currentGrupo: vinculo.grupo };
    });

    // 3. Aplica os filtros de Lado e Grupo da interface
    let listaFiltrada = listaComVinculo;
    if (lado !== 'todos') listaFiltrada = listaFiltrada.filter(s => s.currentLado === lado);
    if (grupoSel !== 'todos') listaFiltrada = listaFiltrada.filter(s => String(s.currentGrupo) === grupoSel);

    if (listaFiltrada.length === 0) {
        cont.innerHTML = `<p class="text-slate-500 col-span-full text-center py-10 italic">Nenhum projeto encontrado para ${currentLab.toUpperCase()} nesta turma.</p>`;
        return;
    }

    // 4. LÓGICA DE EXIBIÇÃO: Individual ou Grupo
    if (serie.includes("6")) {
        // Individual: Renderiza um card por aluno usando o Grupo/RA do contexto atual
        cont.innerHTML = listaFiltrada.sort((a,b) => a.nome_aluno.localeCompare(b.nome_aluno))
            .map(aluno => renderEvalCard(aluno.nome_aluno, aluno.ra, aluno.currentGrupo)).join('');
    } else {
        // Coletivo: Agrupa por número de grupo definido para este laboratório
        const gruposUnicos = [...new Set(listaFiltrada.map(s => s.currentGrupo))].filter(g => g).sort((a,b) => a - b);
        
        cont.innerHTML = gruposUnicos.map(g => {
            const membros = listaFiltrada.filter(s => s.currentGrupo === g)
                                         .map(s => s.nome_aluno)
                                         .sort()
                                         .join(', ');

            return renderEvalCard(`Grupo ${g}`, null, g, membros);
        }).join('');
    }
    
    loadExistingEvaluations(); // Carrega notas que o professor já deu
}

    async function saveFetecEval(ra, grupo, cardId) {
    // 1. Validação do Nome do Professor
    const prof = document.getElementById('evaluator-name').value.trim();
    if (!prof) {
        showToast("⚠️ Por favor, digite o seu nome no topo da página!", "error");
        document.getElementById('evaluator-name').focus();
        document.getElementById('evaluator-name').classList.add('border-red-500');
        return;
    }

    // 2. Recolha das Notas (Convertendo para Float para aceitar decimais)
    const getNota = (sub) => parseFloat(document.getElementById(`nota-${cardId}-${sub}`).value) || 0;

    const payload = {
        ra_aluno: ra !== 'null' ? ra : null,
        grupo: grupo !== 'null' ? parseInt(grupo) : null,
        nome_professor: prof,
        data_eval: new Date().toISOString().split('T')[0],
        
        // Notas individuais
        nota_oralidade: getNota('Oralidade'),
        nota_postura: getNota('Postura'),
        nota_clareza: getNota('Clareza'),
        nota_dominio: getNota('Dominio'),
        nota_transmissao: getNota('Transmissao'),
        
        observacao: document.getElementById(`obs-${cardId}`).value,
        apto_fetec: document.getElementById(`apto-${cardId}`).checked,
        sede: document.getElementById('ev-sede').value,
        serie: document.getElementById('ev-serie').value,
        nome_turma: document.getElementById('ev-turma').value,
        lado: document.getElementById('ev-lado').value,
        usuario_sistema: currentUser
    };

    // 3. Feedback Visual de Carregamento
    const card = document.getElementById(`card-${cardId}`);
    const btn = card.querySelector('button');
    const originalBtnText = btn.innerText;
    
    btn.disabled = true;
    btn.innerText = "⏳ A gravar...";
    card.style.opacity = "0.7";

    // 4. Envio para o Supabase
    const { error } = await _supabase.from('evaluations_fetec').insert([payload]);

    if (error) {
        showToast("❌ Erro ao guardar: " + error.message, "error");
        btn.disabled = false;
        btn.innerText = originalBtnText;
        card.style.opacity = "1";
    } else {
        showToast("✅ Avaliação enviada com sucesso!", "success");
        
        // Bloqueia o card para evitar duplicados na mesma sessão
        btn.innerText = "✅ Gravado";
        btn.classList.replace('bg-emerald-600', 'bg-slate-700');
        card.classList.add('border-emerald-500', 'pointer-events-none');
        card.style.opacity = "0.8";
    }
}

    async function loadExistingEvaluations() {
    const sede = document.getElementById('ev-sede').value;
    const turma = document.getElementById('ev-turma').value;
    const prof = document.getElementById('evaluator-name').value.trim();

    if (!prof) return; // Só carrega se o professor se identificou

    // Busca as avaliações deste professor para esta turma hoje
    const { data, error } = await _supabase
        .from('evaluations_fetec')
        .select('*')
        .eq('sede', sede)
        .eq('nome_turma', turma)
        .eq('nome_professor', prof);

    if (error) {
        console.error("Erro ao carregar avaliações:", error);
        return;
    }

    if (data && data.length > 0) {
        data.forEach(eval => {
            const id = eval.ra_aluno || `g${eval.grupo}`;
            const card = document.getElementById(`card-${id}`);
            
            if (card) {
                // Preenche os campos de nota
                document.getElementById(`nota-${id}-Oralidade`).value = eval.nota_oralidade;
                document.getElementById(`nota-${id}-Postura`).value = eval.nota_postura;
                document.getElementById(`nota-${id}-Clareza`).value = eval.nota_clareza;
                document.getElementById(`nota-${id}-Dominio`).value = eval.nota_dominio;
                document.getElementById(`nota-${id}-Transmissao`).value = eval.nota_transmissao;
                
                // Preenche observação e aptidão
                document.getElementById(`obs-${id}`).value = eval.observacao || '';
                document.getElementById(`apto-${id}`).checked = eval.apto_fetec;

                // Estiliza o card para indicar que já foi salvo
                const btn = card.querySelector('button');
                btn.innerText = "✅ Atualizar Avaliação";
                btn.classList.replace('bg-emerald-600', 'bg-blue-600');
                card.classList.add('border-blue-500/50');
            }
        });
    }
}

    const turmas = [...new Set(listaFiltrada.map(x => x.nome_turma))].sort();
    const grupos = [...new Set(listaFiltrada.filter(x => x.grupo).map(x => x.grupo))].sort((a,b) => a - b);

    // 3. Atualiza o Select de Turmas
    const selectTurma = document.getElementById('ev-turma');
    const turmaAnterior = selectTurma.value; // Tenta manter a turma se ela ainda existir na nova série
    
    selectTurma.innerHTML = turmas.map(t => `<option value="${t}">${t}</option>`).join('');
    
    // Se a turma selecionada antes ainda existe na nova série, mantém. Senão, pega a primeira.
    if (turmas.includes(turmaAnterior)) {
        selectTurma.value = turmaAnterior;
    }

    // 4. Atualiza o Select de Grupos
    document.getElementById('ev-grupo').innerHTML = '<option value="todos">Todos os Grupos</option>' + 
                                                     grupos.map(g => `<option value="${g}">Grupo ${g}</option>`).join('');
    
    // 5. Atualiza a lista de cards na tela
    applyEvalList();
}

function applyAttendanceFilters() {
    // 1. Captura os valores selecionados nos filtros da frequência
    const s = document.getElementById('attendance-filter-sede')?.value || 'todos';
    const e = document.getElementById('attendance-filter-serie')?.value || 'todos';
    const t = document.getElementById('attendance-filter-turno')?.value || 'todos';
    
    // 2. Formata a data para a busca (YYYY-MM-DD)
    const dKey = selectedDate.getFullYear() + '-' + 
                 String(selectedDate.getMonth() + 1).padStart(2, '0') + '-' + 
                 String(selectedDate.getDate()).padStart(2, '0');

    // 3. ATUALIZA OS DROPDOWNS (ENCADEAMENTO)
    updateFilterOptions('attendance', { sede: s, serie: e, turma: t });

    // 4. FILTRA A LISTA DE ALUNOS QUE SERÁ EXIBIDA
    const list = allStudents.filter(x => {
        const mSede = s === 'todos' || x.sede === s;
        const mSerie = e === 'todos' || x.serie === e;
        const mTurma = t === 'todos' || x.nome_turma === t;
        return mSede && mSerie && mTurma;
    });

    const countEl = document.getElementById('attendance-count');
    if (countEl) countEl.innerText = list.length;

    const cont = document.getElementById('attendance-list');
    if (!cont) return;

    if (list.length === 0) {
        cont.innerHTML = `<p class="text-slate-500 text-center py-10">Nenhum aluno encontrado para os filtros selecionados.</p>`;
        return;
    }

    // 5. RENDERIZA A LISTA NA TELA
    // Localize o cont.innerHTML dentro de applyAttendanceFilters e substitua por:
cont.innerHTML = list.sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno)).map((x, index) => {
    const att = allAttendances.find(a => a.ra === x.ra && a.data_presenca === dKey);
    const present = att ? att.presente : true;
    return `
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-slate-600 font-mono font-bold w-6">${index + 1}</span>
                <div>
                    <p class="text-white font-bold">${x.nome_aluno}</p>
                    <p class="text-slate-500 text-xs">${x.nome_turma} | Lado: ${x.parte_sala || '-'}</p>

            <label class="switch">
                <input type="checkbox" onchange="togglePresence('${x.ra}', this.checked)" ${present ? 'checked' : ''}>
                <span class="slider"></span>
            </label>
        </div>`;
}).join('');
}

    async function handleExcelUpload() {
      const file = document.getElementById('excel-upload').files[0];
      if (!file) return showToast("Selecione um arquivo!", "error");

      const btn = document.getElementById('upload-btn');
      const prog = document.getElementById('import-progress');
      const fill = document.getElementById('progress-fill');
      const txt = document.getElementById('progress-text');

      btn.disabled = true;
      prog.classList.remove('hidden');

      const reader = new FileReader();
      reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

        for (let i = 0; i < jsonData.length; i++) {
          const row = jsonData[i];
          const student = {
            sede: String(row.SEDE || ''),
            serie: String(row.SERIE || ''),
            turno: String(row.TURNO || ''),
            curso: String(row.CURSO || ''),
            nome_turma: String(row.NOME_TURMA || ''),
            ra: String(row.RA || ''),
            nome_aluno: String(row.NOME_ALUNO || ''),
            usuario: currentUser
          };

          await _supabase.from('students').upsert(student, { onConflict: 'ra' });
          
          const pct = Math.round(((i + 1) / jsonData.length) * 100);
          fill.style.width = pct + "%";
          txt.innerText = `Importando: ${i+1} de ${jsonData.length}`;
        }
        showToast("Sucesso!", "success");
        await refreshData();
        btn.disabled = false;
        prog.classList.add('hidden');
      };
      reader.readAsArrayBuffer(file);
    }

  async function togglePresence(ra, val) {
    const dKey = selectedDate.toISOString().split('T')[0];
    const student = allStudents.find(x => x.ra === ra);
    if (!student) return;

    const { error } = await _supabase.from('attendance').upsert({
        ra: ra, 
        data_presenca: dKey, 
        disciplina: currentLab, // REGISTRA O LAB ATUAL
        presente: val, 
        nome_aluno: student.nome_aluno, 
        nome_turma: student.nome_turma, 
        usuario: currentUser
    }, { onConflict: 'ra,data_presenca,disciplina' });

    if (error) {
        showToast("Erro ao salvar presença", "error");
    } else {
        // Atualiza memória local
        const index = allAttendances.findIndex(a => a.ra === ra && a.data_presenca === dKey && a.disciplina === currentLab);
        if (index !== -1) allAttendances[index].presente = val;
        else allAttendances.push({ ra, data_presenca: dKey, disciplina: currentLab, presente: val });
        
        showToast(`${val ? 'Presente' : 'Ausente'} em ${currentLab.toUpperCase()}`, "success");
    }
}

    async function massAssign(field, value) {
    if (selectedStudentsForAssign.size === 0) return alert("Selecione alunos na lista!");
    if (!value && field === 'grupo') return alert("Insira um número de grupo.");

    const confirmacao = confirm(`Aplicar "${value}" em ${field} (${currentLab.toUpperCase()}) para ${selectedStudentsForAssign.size} alunos?`);
    if (!confirmacao) return;

    showToast("Atualizando em massa...", "info");

    const ras = Array.from(selectedStudentsForAssign).map(id => {
        const s = allStudents.find(x => x.id === id);
        return s ? s.ra : null;
    }).filter(Boolean);

    // Prepara os dados para a nova tabela de vínculos
    const payloads = ras.map(ra => ({
        ra_aluno: ra,
        disciplina: currentLab,
        [field]: field === 'grupo' ? parseInt(value) : value
    }));

    const { error } = await _supabase
        .from('lab_assignments')
        .upsert(payloads, { onConflict: 'ra_aluno,disciplina' });

    if (error) {
        showToast("Erro na atualização em massa", "error");
    } else {
        showToast("Atualização concluída!", "success");
        selectedStudentsForAssign.clear();
        await refreshData();
        closeAssignRoomModal();
    }
}

    function applyFilters() {
        const sede = document.getElementById('filter-sede')?.value || 'todos';
        const serie = document.getElementById('filter-serie')?.value || 'todos';
        const turma = document.getElementById('filter-turno')?.value || 'todos';
        const parte = document.getElementById('filter-parte-sala')?.value || 'todos';
        const search = document.getElementById('search-nome')?.value.toLowerCase() || '';

        // 1. Atualiza os dropdowns dinamicamente para encadeamento
        updateFilterOptions('management', { sede, serie });

        // 2. Filtra a lista principal
        filteredStudents = allStudents.filter(s => {
            const mSede = sede === 'todos' || s.sede === sede;
            const mSerie = serie === 'todos' || s.serie === serie;
            const mTurma = turma === 'todos' || s.nome_turma === turma;
            const mSearch = s.nome_aluno.toLowerCase().includes(search);
            let mParte = true;
            if(parte === 'nao-atribuido') mParte = !s.parte_sala;
            else if(parte !== 'todos') mParte = s.parte_sala === parte;
            
            return mSede && mSerie && mTurma && mSearch && mParte;
        });
        renderStudentList();
    }

   function updateFilterOptions(ctx, currentFilters = {}) {
        const prefix = ctx === 'management' ? 'filter' : 'attendance-filter';
        
        // Base de dados para os dropdowns (respeita o encadeamento)
        let baseParaDropdowns = allStudents;
        
        // Se uma sede foi selecionada, as séries devem ser apenas daquela sede
        if (currentFilters.sede && currentFilters.sede !== 'todos') {
            baseParaDropdowns = baseParaDropdowns.filter(s => s.sede === currentFilters.sede);
        }
        
        // Se uma série foi selecionada, as turmas devem ser apenas daquela série
        if (currentFilters.serie && currentFilters.serie !== 'todos') {
            baseParaDropdowns = baseParaDropdowns.filter(s => s.serie === currentFilters.serie);
        }

        const sedes = [...new Set(allStudents.map(s => s.sede))].sort(); 
        const series = [...new Set(baseParaDropdowns.map(s => s.serie))].sort();
        const turmas = [...new Set(baseParaDropdowns.map(s => s.nome_turma))].sort();
        
        const populate = (id, list, selectedValue) => {
            const el = document.getElementById(prefix + id);
            if(el) {
                const previousValue = selectedValue || el.value;
                el.innerHTML = '<option value="todos">Todas</option>' + 
                               list.map(x => `<option value="${x}">${x}</option>`).join('');
                
                // Mantém o valor se ele ainda existir na nova lista filtrada
                if (list.includes(previousValue)) el.value = previousValue;
                else el.value = 'todos';
            }
        };

        // Aplica a filtragem nos selects de acordo com o contexto
        populate('-sede', sedes, currentFilters.sede);
        populate('-serie', series, currentFilters.serie);
        populate('-turno', turmas, currentFilters.turma);
    }

   function renderStudentList() {
    const cont = document.getElementById('student-list');
    const count = document.getElementById('student-count');
    if(!cont) return;
    
    // Atualiza o contador de alunos filtrados na tela
    count.innerText = filteredStudents.length;

    cont.innerHTML = `
        <table class="w-full text-white">
            <thead class="bg-slate-900/50">
                <tr>
                    <th class="p-3 text-left w-12">#</th>
                    <th class="p-3 text-left">Nome</th>
                    <th class="p-3 text-left">Turma</th>
                    <th class="p-3 text-left">Lado/G (${currentLab.toUpperCase()})</th>
                    <th class="p-3 text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                ${filteredStudents
                    .sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno))
                    .map((s, index) => {
                        // BUSCA O VÍNCULO ESPECÍFICO (Maker ou Ciências)
                        // Esta é a parte vital: ela procura o RA e a Disciplina atual
                        const assign = allAssignments.find(a => 
                            a.ra_aluno === s.ra &&

                        ) || { lado: null, grupo: null };

                        <tr class="border-b border-slate-700 hover:bg-slate-700/30">

                            <td class="p-3">
                                <p class="font-medium">${s.nome_aluno}</p>
                                <p class="text-[10px] text-slate-500 uppercase">${s.sede}</p>
                            </td>
                            <td class="p-3 text-sm">${s.nome_turma}</td>
                            
                            <td class="p-3 text-sm">
                                <span class="px-2 py-1 rounded ${assign.lado ? 'bg-blue-900/40 text-blue-400' : 'text-slate-600'}">
                                    ${assign.lado || '-'}
                                </span>
                                <span class="ml-1 font-bold ${assign.grupo ? 'text-emerald-400' : 'text-slate-600'}">
                                    ${assign.grupo ? 'G' + assign.grupo : ''}

                            </td>

                            <td class="p-3 text-center">

                                </button>
                                ${currentLab === 'maker' ? `
                                    <button onclick="deleteStudent('${s.id}')" title="Excluir" class="text-red-400 hover:text-red-300 transition-colors">
                                        🗑️
                                    </button>
                                ` : '<span title="Apenas Admin Maker pode excluir" class="opacity-20 grayscale cursor-not-allowed">🗑️</span>'}
                            </td>
                        </tr>`;
                    }).join('')}
            </tbody>
        </table>`;
}

       function openEditModal(ra) {
    // 1. Localiza os dados fixos do aluno
    const s = allStudents.find(x => x.ra === ra);
    if (!s) return showToast("Aluno não encontrado", "error");

    // 2. Localiza os dados específicos do laboratório atual (Maker ou Ciências)
    const assign = allAssignments.find(a => 
        a.ra_aluno === ra && 
        a.disciplina === currentLab
    ) || { lado: null, grupo: null };

    // 3. Atualiza o título do Modal com o contexto atual
    document.getElementById('modal-title').innerText = `Editar Aluno (${currentLab.toUpperCase()})`;
    
    // 4. Preenche os Dropdowns (Sede, Série, Turma)
    populateModalDropdowns(s);
    
    // 5. Preenche os campos do formulário
    document.getElementById('m-nome').value = s.nome_aluno;
    document.getElementById('m-ra').value = s.ra;
    document.getElementById('m-parte').value = assign.lado || '';
    document.getElementById('m-grupo').value = assign.grupo || '';

    // 6. TRAVA DE SEGURANÇA (A essência do Passo 3.3)
    // Se o laboratório logado for 'ciencias', bloqueamos os campos fixos
    const isReadOnly = (currentLab === 'ciencias');

    document.getElementById('m-nome').disabled = isReadOnly;
    document.getElementById('m-ra').disabled = isReadOnly;
    document.getElementById('m-sede').disabled = isReadOnly;
    document.getElementById('m-serie').disabled = isReadOnly;
    document.getElementById('m-turma').disabled = isReadOnly;

    // Adiciona um estilo visual de "bloqueado" para os campos desativados
    const fixedFields = ['m-nome', 'm-ra', 'm-sede', 'm-serie', 'm-turma'];
    fixedFields.forEach(id => {
        const el = document.getElementById(id);
        if (isReadOnly) {
            el.classList.add('opacity-50', 'cursor-not-allowed', 'bg-slate-800');
        } else {
            el.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-slate-800');
        }
    });

    // 7. Mostra o Modal
    document.getElementById('student-modal').classList.remove('hidden');
}

    function openAddModal() {
    document.getElementById('modal-title').innerText = "Adicionar Aluno";
    document.getElementById('student-form').reset();
    
    // Preenche os dropdowns com as opções disponíveis (sem seleção prévia)
    populateModalDropdowns();
    
    document.getElementById('student-modal').classList.remove('hidden');
}

    // Função para selecionar ou desmarcar todos os visíveis no modal
function quickSelect(status) {
    const checkboxes = document.querySelectorAll('.student-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = status;
        const id = cb.getAttribute('data-id');
        if (status) selectedStudentsForAssign.add(id);
        else selectedStudentsForAssign.delete(id);
    });
}

// Função para selecionar a primeira metade da lista (ordem alfabética)
function quickSelectHalf() {
    quickSelect(false); // Limpa tudo primeiro
    const checkboxes = document.querySelectorAll('.student-checkbox');
    const half = Math.ceil(checkboxes.length / 2);
    
    for (let i = 0; i < half; i++) {
        checkboxes[i].checked = true;
        const id = checkboxes[i].getAttribute('data-id');
        selectedStudentsForAssign.add(id);
    }
}

    // Função para abrir o modal e carregar apenas os alunos que estão filtrados na tela
    function openAssignRoomModal() {
    const listCont = document.getElementById('assign-list');
    if (!listCont) return;

    // Limpa a seleção anterior ao abrir o modal
    selectedStudentsForAssign.clear(); 

    if (filteredStudents.length === 0) {
        listCont.innerHTML = `<p class="text-slate-500 text-center py-4 italic">Nenhum aluno filtrado na tela para atribuir.</p>`;
    } else {
        // Ordena a lista filtrada por nome para facilitar a visualização
        const sortedList = [...filteredStudents].sort((a, b) => a.nome_aluno.localeCompare(b.nome_aluno));
        
        // Inserção dos botões de seleção rápida e cabeçalho informativo
        listCont.innerHTML = `
            <div class="flex flex-wrap gap-2 mb-4 sticky top-0 bg-slate-900 p-2 rounded-lg z-10 border border-slate-700 shadow-md">
                <button onclick="quickSelect(true)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-1.5 px-2 rounded text-[10px] font-black uppercase tracking-wider">✅ Todos</button>
                <button onclick="quickSelectHalf()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-1.5 px-2 rounded text-[10px] font-black uppercase tracking-wider">🌓 Metade</button>
                <button onclick="quickSelect(false)" class="flex-1 bg-red-900/30 text-red-400 py-1.5 px-2 rounded text-[10px] font-black uppercase tracking-wider border border-red-900/50">❌ Limpar</button>
            </div>
            
            <div id="check-list-container" class="space-y-1">
                ${sortedList.map(s => {
                    // Busca o vínculo atual do aluno para o laboratório logado (Maker ou Ciências)
                    const assign = allAssignments.find(a => 
                        a.ra_aluno === s.ra && 
                        a.disciplina === currentLab
                    ) || { lado: null, grupo: null };

                    const hasData = assign.lado || assign.grupo;

                    return `
                        <div class="flex items-center gap-3 p-2 border-b border-slate-700/50 hover:bg-slate-700/30 transition-all">
                            <input type="checkbox" 
                                   class="student-checkbox w-4 h-4 cursor-pointer accent-blue-500" 
                                   data-id="${s.id}"
                                   onchange="this.checked ? selectedStudentsForAssign.add('${s.id}') : selectedStudentsForAssign.delete('${s.id}')">
                            
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between flex-1 gap-1">
                                <div class="flex flex-col">
                                    <span class="text-white text-sm font-medium leading-tight">${s.nome_aluno}</span>
                                    <span class="text-slate-500 text-[9px] uppercase tracking-tighter">${s.nome_turma} | RA: ${s.ra}</span>
                                </div>

                                <div class="flex items-center">
                                    <span class="text-[10px] px-2 py-0.5 rounded font-bold ${hasData ? 'bg-blue-900/40 text-blue-400 border border-blue-800/30' : 'text-slate-600 italic'}">
                                        ${hasData ? 
                                            `${assign.lado || '-'}${assign.grupo ? ' / G'+assign.grupo : ''}` : 
                                            'sem grupo'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }
    
    // Abre o modal removendo a classe hidden
    document.getElementById('assign-room-modal').classList.remove('hidden');
}

    // --- INICIALIZAÇÃO ---
    window.onload = () => {
    if(sessionStorage.getItem('isAuth') === 'true') {
        isAuthenticated = true;
        currentLab = sessionStorage.getItem('currentLab') || 'maker';
        currentUser = sessionStorage.getItem('userRole') || 'admin_maker';
        refreshData().then(() => renderManagementScreen());
    } else {
        showLoginScreen();
    }
};

    // (Funções de utilidade como formatDate, handleLogout, close modals seguem o padrão)
    function formatDate(d) { return d.toLocaleDateString('pt-BR'); }
    function closeStudentModal() { document.getElementById('student-modal').classList.add('hidden'); }
    function closeAssignRoomModal() { document.getElementById('assign-room-modal').classList.add('hidden'); }
   function handleLogout() {
    // 1. Limpa todos os dados da sessão do navegador
    sessionStorage.clear(); 
    
    // 2. Reseta as variáveis de estado globais para o padrão de segurança
    isAuthenticated = false;
    currentUser = null;
    currentLab = 'maker'; // Volta para o padrão
    currentScreen = 'login';
    
    // 3. Limpa listas temporárias da memória
    allStudents = [];
    allAssignments = [];
    allAttendances = [];
    
    // 4. Feedback visual e redirecionamento
    showToast("Sessão encerrada com sucesso", "info");
    showLoginScreen();
    
    // 5. Opcional: Força um recarregamento da página para garantir limpeza total do cache
    // window.location.reload(); 
}
    function showToast(m, t) { 
        const toast = document.createElement('div');
        toast.className = `toast ${t === 'success' ? 'bg-green-600' : 'bg-blue-600'}`;
        toast.innerText = m;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
  </script>
